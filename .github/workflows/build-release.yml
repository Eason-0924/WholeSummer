name: Build Release Artifacts
run-name: Release ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        shell: bash
        run: |
          VERSION="$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$VERSION" ]] || { echo "Tag version does not match pom.xml"; exit 1; }
          fi
          CARD_LISTENER_VERSION="$(tr -d '[:space:]' < tools/card-listener/VERSION)"
          [[ "$CARD_LISTENER_VERSION" =~ ^[1-9][0-9]*$ ]] || { echo "Invalid Card Listener version"; exit 1; }
          CARD_LISTENER_CHANGED=true
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            PREVIOUS_TAG="$(git tag --sort=-version:refname | awk -v current="${GITHUB_REF_NAME}" '$0 != current { print; exit }')"
            if [[ -n "$PREVIOUS_TAG" ]] && git diff --quiet "$PREVIOUS_TAG" "$GITHUB_SHA" -- tools/card-listener; then
              CARD_LISTENER_CHANGED=false
            elif [[ -n "$PREVIOUS_TAG" ]]; then
              PREVIOUS_CARD_LISTENER_VERSION="$(git show "$PREVIOUS_TAG:tools/card-listener/VERSION" 2>/dev/null | tr -d '[:space:]' || true)"
              [[ "$CARD_LISTENER_VERSION" != "$PREVIOUS_CARD_LISTENER_VERSION" ]] || {
                echo "Card Listener changed but tools/card-listener/VERSION was not bumped"; exit 1;
              }
            fi
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "JAR_NAME=WholeSummer-$VERSION.jar" >> "$GITHUB_ENV"
          echo "CARD_LISTENER_VERSION=$CARD_LISTENER_VERSION" >> "$GITHUB_ENV"
          echo "CARD_LISTENER_CHANGED=$CARD_LISTENER_CHANGED" >> "$GITHUB_ENV"
          echo "CARD_LISTENER_ZIP=WholeSummer-CardListener-v$CARD_LISTENER_VERSION.zip" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Set up .NET
        if: env.CARD_LISTENER_CHANGED == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build EC2 Spring Boot JAR
        run: ./mvnw clean package -DskipTests

      - name: Build Windows card listener only
        if: env.CARD_LISTENER_CHANGED == 'true'
        run: |
          dotnet publish tools/card-listener/WholeSummer.CardListener.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -o card-listener-publish
          test -f card-listener-publish/WholeSummer.CardListener.exe
          test -f card-listener-publish/appsettings.json

      - name: Prepare release assets
        run: |
          mkdir -p release
          JAR=$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*.original' | head -n 1)
          test -n "$JAR"
          cp "$JAR" "release/$JAR_NAME"
          if [[ "$CARD_LISTENER_CHANGED" == "true" ]]; then
            zip -j "release/$CARD_LISTENER_ZIP" \
              card-listener-publish/WholeSummer.CardListener.exe \
              card-listener-publish/appsettings.json
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: WholeSummer-Release-v${{ env.APP_VERSION }}
          path: release/

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE=release/release-notes.md
          if [[ "$CARD_LISTENER_CHANGED" == "true" ]]; then
            RELEASE_TITLE="WholeSummer $APP_VERSION · Card Listener v$CARD_LISTENER_VERSION"
          else
            RELEASE_TITLE="WholeSummer $APP_VERSION"
          fi
          echo "$RELEASE_TITLE" > "$NOTES_FILE"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" \
            --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"
          gh release upload "$TAG" "release/$JAR_NAME" --clobber
          if [[ "$CARD_LISTENER_CHANGED" == "true" ]]; then
            gh release upload "$TAG" "release/$CARD_LISTENER_ZIP" --clobber
          fi
