name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set app version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "1.0.0"
          }

          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "EXE_NAME=WholeSummer-Windows-Installer-$version.exe" >> $env:GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build Spring Boot jar
        run: ./mvnw clean package -DskipTests

      - name: Prepare jpackage input folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path input

          $jar = Get-ChildItem target -Filter "*.jar" |
            Where-Object { $_.Name -notlike "*.original" } |
            Select-Object -First 1

          if ($null -eq $jar) {
            Write-Error "No jar file found in target folder."
            exit 1
          }

          Write-Host "Found jar: $($jar.FullName)"
          Copy-Item $jar.FullName input\WholeSummer.jar

      - name: Build Windows EXE with jpackage
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --name WholeSummer ^
            --app-version %APP_VERSION% ^
            --input input ^
            --main-jar WholeSummer.jar ^
            --dest dist ^
            --win-menu ^
            --win-shortcut ^
            --win-dir-chooser ^
            --java-options "-Dspring.config.additional-location=file:C:/WholeSummer/config/"

      - name: Rename Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release

          $exe = Get-ChildItem dist -Filter "*.exe" | Select-Object -First 1

          if ($null -eq $exe) {
            Write-Error "No exe file found in dist folder."
            exit 1
          }

          Copy-Item $exe.FullName "release\${{ env.EXE_NAME }}"

          Write-Host "Installer prepared: release\${{ env.EXE_NAME }}"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: WholeSummer-Windows-Installer-v${{ env.APP_VERSION }}
          path: release/${{ env.EXE_NAME }}

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $file = "release\${{ env.EXE_NAME }}"
          $title = "WholeSummer $tag"

          gh release view $tag

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release already exists. Uploading asset with --clobber..."
            gh release upload $tag $file --clobber
          } else {
            Write-Host "Release does not exist. Creating release..."
            gh release create $tag $file `
              --title $title `
              --notes-from-tag
          }