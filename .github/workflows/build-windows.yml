name: Build Windows EXE
run-name: Release 1.2.2.6

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set app version
        shell: pwsh
        run: |
          [xml]$pom = Get-Content "pom.xml"
          $pomVersion = $pom.project.version

          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
            if ($version -ne $pomVersion) {
              Write-Error "Tag version $version does not match pom.xml version $pomVersion."
              exit 1
            }
          } else {
            $version = $pomVersion
          }

          $versionParts = $version.Split(".")
          if ($versionParts.Count -eq 4) {
            $windowsPatch = ([int]$versionParts[2] * 100) + [int]$versionParts[3]
            $windowsAppVersion = "$($versionParts[0]).$($versionParts[1]).$windowsPatch"
          } else {
            $windowsAppVersion = $version
          }

          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "WINDOWS_APP_VERSION=$windowsAppVersion" >> $env:GITHUB_ENV
          echo "EXE_NAME=WholeSummer-Windows-Installer-v$version.exe" >> $env:GITHUB_ENV
          echo "CARD_LISTENER_ZIP=WholeSummer-CardListener-v$version.zip" >> $env:GITHUB_ENV
          Write-Host "Release version: $version"
          Write-Host "Windows installer internal version: $windowsAppVersion"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build Spring Boot jar
        run: ./mvnw clean package -DskipTests

      - name: Build Windows card listener
        shell: pwsh
        run: |
          dotnet publish tools\card-listener\WholeSummer.CardListener.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o card-listener-publish

          if (-not (Test-Path "card-listener-publish\WholeSummer.CardListener.exe")) {
            Write-Error "No card listener executable found after dotnet publish."
            exit 1
          }
          if (-not (Test-Path "card-listener-publish\appsettings.json")) {
            Copy-Item tools\card-listener\appsettings.json card-listener-publish\
          }

      - name: Prepare jpackage input folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path input
          New-Item -ItemType Directory -Force -Path input\tools\card-listener

          $jar = Get-ChildItem target -Filter "*.jar" |
            Where-Object { $_.Name -notlike "*.original" } |
            Select-Object -First 1

          if ($null -eq $jar) {
            Write-Error "No jar file found in target folder."
            exit 1
          }

          Write-Host "Found jar: $($jar.FullName)"
          Copy-Item $jar.FullName input\WholeSummer.jar
          Copy-Item card-listener-publish\WholeSummer.CardListener.exe input\tools\card-listener\
          Copy-Item card-listener-publish\appsettings.json input\tools\card-listener\

      - name: Build Windows EXE with jpackage
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --name WholeSummer ^
            --app-version %WINDOWS_APP_VERSION% ^
            --input input ^
            --main-jar WholeSummer.jar ^
            --dest dist ^
            --icon packaging\windows\WholeSummer.ico ^
            --win-menu ^
            --win-menu-group WholeSummer ^
            --win-shortcut ^
            --win-dir-chooser ^
            --win-upgrade-uuid "6f3c08df-767c-4b13-9d6c-e7bf77709561" ^
            --vendor "WholeSummer" ^
            --description "WholeSummer cram school management system" ^
            --java-options "-Dwholesummer.external-config.enabled=true" ^
            --java-options "-Dwholesummer.app-exe=$APPDIR/../WholeSummer.exe"

      - name: Rename Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release

          $exe = Get-ChildItem dist -Filter "*.exe" | Select-Object -First 1

          if ($null -eq $exe) {
            Write-Error "No exe file found in dist folder."
            exit 1
          }

          Copy-Item $exe.FullName "release\${{ env.EXE_NAME }}"
          Compress-Archive `
            -Path card-listener-publish\WholeSummer.CardListener.exe, card-listener-publish\appsettings.json `
            -DestinationPath "release\${{ env.CARD_LISTENER_ZIP }}" `
            -Force

          Write-Host "Installer prepared: release\${{ env.EXE_NAME }}"
          Write-Host "Card listener package prepared: release\${{ env.CARD_LISTENER_ZIP }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: WholeSummer-Windows-v${{ env.APP_VERSION }}
          path: |
            release/${{ env.EXE_NAME }}
            release/${{ env.CARD_LISTENER_ZIP }}

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $file = "release\${{ env.EXE_NAME }}"
          $listenerZip = "release\${{ env.CARD_LISTENER_ZIP }}"
          $version = "${{ env.APP_VERSION }}"
          $title = "WholeSummer $version"
          $notesFile = "release\release-notes.md"
          $tagContents = git for-each-ref --format="%(contents)" "refs/tags/$tag"
          $detailLines = @($tagContents | Where-Object { $_ -match "^\s*-\s+" })

          Set-Content -Path $notesFile -Value "Release $version" -Encoding utf8
          if ($detailLines.Count -gt 0) {
            Add-Content -Path $notesFile -Value ""
            Add-Content -Path $notesFile -Value $detailLines
          }

          gh release view $tag

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release already exists. Updating title, notes and asset..."
            gh release edit $tag `
              --title $title `
              --notes-file $notesFile
            gh release upload $tag $file $listenerZip --clobber
          } else {
            Write-Host "Release does not exist. Creating release..."
            gh release create $tag $file $listenerZip `
              --title $title `
              --notes-file $notesFile
          }
