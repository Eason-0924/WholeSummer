name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set app version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "1.0.0"
          }
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build Spring Boot jar
        run: ./mvnw clean package -DskipTests

      - name: Prepare jpackage input folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path input
      
          $jar = Get-ChildItem target -Filter "*.jar" |
            Where-Object { $_.Name -notlike "*.original" } |
            Select-Object -First 1
      
          if ($null -eq $jar) {
            Write-Error "No jar file found in target folder."
            exit 1
          }
      
          Write-Host "Found jar: $($jar.FullName)"
          Copy-Item $jar.FullName input\WholeSummer.jar

      - name: Build Windows EXE with jpackage
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --name WholeSummer ^
            --app-version %APP_VERSION% ^
            --input input ^
            --main-jar WholeSummer.jar ^
            --dest dist ^
            --win-menu ^
            --win-shortcut ^
            --win-dir-chooser ^
            --java-options "-Dspring.config.additional-location=file:C:/WholeSummer/config/"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: WholeSummer-Windows-Installer-${{ env.APP_VERSION }}
          path: dist/*.exe