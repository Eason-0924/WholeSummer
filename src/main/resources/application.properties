spring.application.name=WholeSummer
spring.config.import=optional:file:./config/application.properties

spring.datasource.url=${WHOLESUMMER_DB_URL:jdbc:mysql://localhost:3306/WholeSummer?serverTimezone=Asia/Taipei&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.username=${WHOLESUMMER_DB_USERNAME:root}
spring.datasource.password=${WHOLESUMMER_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.address=0.0.0.0
server.port=8080

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

app.data.dir=${user.dir}/data
app.backup.dir=${user.dir}/data/backups
app.update.dir=${user.dir}/data/update
app.mysql.bin-dir=
app.auto-update.enabled=false
app.update.check-on-startup=true
app.update.check-interval-hours=24
app.update.github-owner=Eason-0924
app.update.github-repo=WholeSummer
