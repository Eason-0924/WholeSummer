spring.application.name=WholeSummer
spring.config.import=optional:file:./config/application.properties
spring.lifecycle.timeout-per-shutdown-phase=3s

spring.datasource.url=${WHOLESUMMER_DB_URL:jdbc:mysql://localhost:3306/WholeSummer?serverTimezone=Asia/Taipei&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.username=${WHOLESUMMER_DB_USERNAME:root}
spring.datasource.password=${WHOLESUMMER_DB_PASSWORD:}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.address=0.0.0.0
server.port=8080

# Keep technical monitoring private. Production deployment should use the
# production profile, which also binds the main application to localhost.
management.server.address=${WHOLESUMMER_MANAGEMENT_ADDRESS:127.0.0.1}
management.server.port=${WHOLESUMMER_MANAGEMENT_PORT:9090}
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,loggers,threaddump
management.endpoint.health.show-details=never
management.endpoint.heapdump.enabled=false
management.endpoint.env.enabled=false
management.endpoint.configprops.enabled=false
management.endpoint.beans.enabled=false
management.endpoint.mappings.enabled=false

info.app.name=${spring.application.name}
info.app.version=${app.version:unknown}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

app.data.dir=${user.dir}/data
app.backup.dir=${user.dir}/data/backups
app.exam-paper.dir=${WHOLESUMMER_CLASS_DATA_DIR:/opt/WholeSummer/data/class-files}
# Keep downloaded installers outside the jpackage installation directory.
app.update.dir=${WHOLESUMMER_UPDATE_DIR:/opt/WholeSummer/update}
app.update.jar-path=${WHOLESUMMER_JAR_PATH:/opt/WholeSummer/current.jar}
app.update.release-dir=${WHOLESUMMER_RELEASE_DIR:/opt/WholeSummer/releases}
app.update.service-name=${WHOLESUMMER_SERVICE_NAME:wholesummer.service}
app.mysql.bin-dir=
app.status-window.enabled=${WHOLESUMMER_STATUS_WINDOW_ENABLED:false}
app.card-listener.enabled=${WHOLESUMMER_CARD_LISTENER_ENABLED:false}
app.auto-update.enabled=${WHOLESUMMER_AUTO_UPDATE_ENABLED:false}
app.card-listener.token=${WHOLESUMMER_CARD_LISTENER_TOKEN:}
app.update.check-on-startup=true
app.update.check-interval-hours=24
app.update.github-owner=Eason-0924
app.update.github-repo=WholeSummer

app.report.mail.enabled=${WHOLESUMMER_REPORT_ENABLED:false}
app.report.mail.api-key=${RESEND_API_KEY:}
app.report.mail.from=${WHOLESUMMER_REPORT_FROM:}
app.report.mail.recipient=${WHOLESUMMER_REPORT_RECIPIENT:}

line.enabled=${LINE_ENABLED:false}
line.channel-secret=${LINE_CHANNEL_SECRET:}
line.channel-access-token=${LINE_CHANNEL_ACCESS_TOKEN:}
line.webhook-path=/api/line/webhook
line.liff-id=${LINE_LIFF_ID:}
line.liff-channel-id=${LINE_LIFF_CHANNEL_ID:}

webpush.vapid.public-key=${WEBPUSH_VAPID_PUBLIC_KEY:}
webpush.vapid.private-key=${WEBPUSH_VAPID_PRIVATE_KEY:}
webpush.vapid.subject=${WEBPUSH_VAPID_SUBJECT:mailto:admin@whole-summer.com}

# Keep static PWA resources consistently decoded as UTF-8 across servlet containers.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
