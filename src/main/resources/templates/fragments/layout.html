<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${title}">霍爾夏天補習班 Whole Summer</title>
	<script th:inline="javascript">
		(() => {
			const theme = /*[[${themeMode}]]*/ 'light';
			document.documentElement.dataset.bsTheme = theme;
		})();
	</script>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		.brand-navbar {
			background-color: #0B90D5;
			transition: background-color 0.25s ease;
		}
		body,
		.bg-white,
		.bg-light,
		.card,
		.table,
		.table-light,
		.form-control,
		.form-select,
		.btn,
		.page-help-popover,
		.schedule-card,
		.schedule-cell,
		.schedule-slot {
			transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
		}
		.page-title-line {
			align-items: center;
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
		}
		.page-help-icon {
			align-items: center;
			border: 1px solid #6c757d;
			border-radius: 50%;
			color: #6c757d;
			cursor: help;
			display: inline-flex;
			font-size: 0.72rem;
			font-family: Georgia, "Times New Roman", serif;
			font-style: italic;
			font-weight: 700;
			height: 1.1rem;
			justify-content: center;
			line-height: 1;
			width: 1.1rem;
		}
		.page-help-wrapper {
			align-items: center;
			display: inline-flex;
			flex: 0 0 auto;
			position: relative;
		}
		.page-help-icon:focus,
		.page-help-icon:hover {
			background-color: #6c757d;
			color: #fff;
			outline: none;
		}
		.page-help-popover {
			background: #fff;
			border: 1px solid rgba(108, 117, 125, 0.3);
			border-radius: 0.5rem;
			box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.12);
			color: #212529;
			font-size: 0.875rem;
			line-height: 1.6;
			opacity: 0;
			padding: 0.75rem 0.875rem;
			pointer-events: none;
			position: absolute;
			left: 0;
			top: calc(100% + 0.45rem);
			visibility: hidden;
			white-space: nowrap;
			width: max-content;
			max-width: min(42rem, calc(100vw - 2rem));
			z-index: 1080;
		}
		.page-help-popover::before {
			background: #fff;
			border-left: 1px solid rgba(108, 117, 125, 0.3);
			border-top: 1px solid rgba(108, 117, 125, 0.3);
			content: "";
			height: 0.6rem;
			position: absolute;
			left: 0.45rem;
			top: -0.35rem;
			transform: rotate(45deg);
			width: 0.6rem;
		}
		.page-help-wrapper:focus-within .page-help-popover,
		.page-help-wrapper:hover .page-help-popover {
			opacity: 1;
			visibility: visible;
		}
		.attendance-note-wrapper {
			display: inline-flex;
			position: relative;
		}
		.attendance-table-responsive {
			overflow: visible;
		}
		.attendance-note-popover {
			background: #fff;
			border: 1px solid rgba(108, 117, 125, 0.3);
			border-radius: 0.5rem;
			box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.12);
			color: #212529;
			font-size: 0.875rem;
			line-height: 1.6;
			max-width: min(22rem, calc(100vw - 2rem));
			opacity: 0;
			padding: 0.65rem 0.75rem;
			pointer-events: none;
			position: absolute;
			left: 0;
			top: calc(100% + 0.45rem);
			visibility: hidden;
			white-space: pre-line;
			width: max-content;
			z-index: 1080;
		}
		.attendance-note-popover::before {
			background: #fff;
			border-left: 1px solid rgba(108, 117, 125, 0.3);
			border-top: 1px solid rgba(108, 117, 125, 0.3);
			content: "";
			height: 0.6rem;
			position: absolute;
			left: 0.45rem;
			top: -0.35rem;
			transform: rotate(45deg);
			width: 0.6rem;
		}
		.attendance-note-wrapper:hover .attendance-note-popover,
		.attendance-note-wrapper:focus-within .attendance-note-popover {
			opacity: 1;
			visibility: visible;
		}
		.settings-nav-link {
			font-size: 1.45rem;
			line-height: 1;
			padding-top: 0.45rem;
		}
		[data-bs-theme="dark"] .brand-navbar {
			background-color: #24306f;
		}
		[data-bs-theme="dark"] body.bg-light {
			background-color: #121416 !important;
		}
		[data-bs-theme="dark"] .bg-white {
			background-color: #1b1f23 !important;
		}
		[data-bs-theme="dark"] .bg-light {
			background-color: #24292e !important;
		}
		[data-bs-theme="dark"] .text-dark {
			color: #f8f9fa !important;
		}
		[data-bs-theme="dark"] .table-light {
			--bs-table-bg: #24292e;
			--bs-table-color: #f8f9fa;
			border-color: #3b424a;
		}
		[data-bs-theme="dark"] .border {
			border-color: #3b424a !important;
		}
		[data-bs-theme="dark"] .btn-outline-primary {
			--bs-btn-color: #fff;
			--bs-btn-bg: #0d6efd;
			--bs-btn-border-color: #0d6efd;
			--bs-btn-hover-color: #fff;
			--bs-btn-hover-bg: #0b5ed7;
			--bs-btn-hover-border-color: #0a58ca;
			--bs-btn-active-color: #fff;
			--bs-btn-active-bg: #0a58ca;
			--bs-btn-active-border-color: #0a53be;
		}
		[data-bs-theme="dark"] .btn-outline-secondary {
			--bs-btn-color: #fff;
			--bs-btn-bg: #6c757d;
			--bs-btn-border-color: #6c757d;
			--bs-btn-hover-color: #fff;
			--bs-btn-hover-bg: #5c636a;
			--bs-btn-hover-border-color: #565e64;
			--bs-btn-active-color: #fff;
			--bs-btn-active-bg: #565e64;
			--bs-btn-active-border-color: #51585e;
		}
		[data-bs-theme="dark"] .btn-outline-success {
			--bs-btn-color: #fff;
			--bs-btn-bg: #198754;
			--bs-btn-border-color: #198754;
			--bs-btn-hover-color: #fff;
			--bs-btn-hover-bg: #157347;
			--bs-btn-hover-border-color: #146c43;
			--bs-btn-active-color: #fff;
			--bs-btn-active-bg: #146c43;
			--bs-btn-active-border-color: #13653f;
		}
		[data-bs-theme="dark"] .btn-outline-danger {
			--bs-btn-color: #fff;
			--bs-btn-bg: #dc3545;
			--bs-btn-border-color: #dc3545;
			--bs-btn-hover-color: #fff;
			--bs-btn-hover-bg: #bb2d3b;
			--bs-btn-hover-border-color: #b02a37;
			--bs-btn-active-color: #fff;
			--bs-btn-active-bg: #b02a37;
			--bs-btn-active-border-color: #a52834;
		}
		[data-bs-theme="dark"] .btn-outline-warning {
			--bs-btn-color: #212529;
			--bs-btn-bg: #ffc107;
			--bs-btn-border-color: #ffc107;
			--bs-btn-hover-color: #212529;
			--bs-btn-hover-bg: #ffca2c;
			--bs-btn-hover-border-color: #ffc720;
			--bs-btn-active-color: #212529;
			--bs-btn-active-bg: #ffcd39;
			--bs-btn-active-border-color: #ffc720;
		}
		[data-bs-theme="dark"] .schedule-card {
			background-color: var(--schedule-bg, #1f2937) !important;
			border-color: var(--schedule-border, #334155) !important;
			color: #f8f9fa;
		}
		[data-bs-theme="dark"] .schedule-card:hover {
			background-color: var(--schedule-hover, #263449) !important;
			color: #f8f9fa;
		}
		[data-bs-theme="dark"] .schedule-card-meta {
			color: #cbd5e1;
		}
		[data-bs-theme="dark"] .page-help-popover {
			background: #1b1f23;
			color: #f8f9fa;
		}
		[data-bs-theme="dark"] .page-help-popover::before {
			background: #1b1f23;
		}
		[data-bs-theme="dark"] .attendance-note-popover {
			background: #1b1f23;
			color: #f8f9fa;
		}
		[data-bs-theme="dark"] .attendance-note-popover::before {
			background: #1b1f23;
		}
	</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark brand-navbar" th:fragment="navbar">
	<div class="container">
		<a class="navbar-brand" th:href="@{/}" th:text="${systemName}">霍爾夏天補習班 Whole Summer</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
				aria-controls="mainNav" aria-expanded="false" aria-label="切換選單">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="mainNav">
			<ul class="navbar-nav ms-auto">
				<li class="nav-item"><a class="nav-link" th:href="@{/students}">學生</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/teachers}">教師</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/classes}">班級</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/subjects}">科目</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/exams}">測驗</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/homeworks}">作業</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/salary}">薪資</a></li>
				<li class="nav-item"><a class="nav-link settings-nav-link" th:href="@{/settings}" aria-label="設定">⚙</a></li>
				<li class="nav-item d-flex align-items-center">
					<span class="navbar-text px-2" th:text="${currentTeacherName}">教師</span>
				</li>
				<li class="nav-item">
					<form th:action="@{/logout}" method="post" class="d-inline">
						<button class="nav-link btn btn-link px-2" type="submit">登出</button>
					</form>
				</li>
			</ul>
		</div>
	</div>
</nav>

<div th:fragment="help(text)" class="page-help-wrapper">
	<span class="page-help-icon" tabindex="0" th:attr="aria-label=${text}">i</span>
	<span class="page-help-popover" th:text="${text}">操作提示</span>
</div>

<th:block th:fragment="scripts">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		function applyWholeSummerTheme(theme) {
			document.documentElement.dataset.bsTheme = theme;
			document.querySelectorAll('[data-theme-option]').forEach((input) => {
				input.checked = input.value === theme;
			});
			window.dispatchEvent(new CustomEvent('wholeSummerThemeChanged', { detail: { theme } }));
		}

		document.querySelectorAll('.page-help-popover').forEach((popover) => {
			const text = popover.textContent.replace(/\\n/g, '\n');
			popover.textContent = '';
			text.split('\n').forEach((line, index) => {
				if (index > 0) {
					popover.appendChild(document.createElement('br'));
				}
				popover.appendChild(document.createTextNode(line));
			});
		});

		document.querySelectorAll('[data-theme-option]').forEach((input) => {
			input.addEventListener('change', () => applyWholeSummerTheme(input.value));
		});
		applyWholeSummerTheme(document.documentElement.dataset.bsTheme || 'light');

		const overdueReminderDaysInput = document.querySelector('[data-overdue-reminder-days]');
		if (overdueReminderDaysInput) {
			overdueReminderDaysInput.value = overdueReminderDaysInput.dataset.currentValue || '3';
		}
	</script>
</th:block>
</body>
</html>
