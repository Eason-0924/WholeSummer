<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${title}">霍爾夏天補習班 Whole Summer</title>
	<script>
		(() => {
			const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			let preference = 'system';
			try {
				preference = localStorage.getItem('wholeSummerThemeMode') || 'system';
			} catch (error) {
				preference = 'system';
			}
			const theme = preference === 'system'
					? (systemDark ? 'dark' : 'light')
					: preference;
			document.documentElement.dataset.bsTheme = theme === 'dark' ? 'dark' : 'light';
		})();
	</script>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

		.brand-navbar {

			transition: background-color 0.25s ease;
		}

		.table-light,

		.btn,
		.page-help-popover,
		.schedule-card,
		.schedule-cell,
		.schedule-slot {

		}
		.salary-gold {
			color: #FFD43B;
		}
		.page-title-line {

			display: flex;
			flex-wrap: wrap;

		}

			border-top: 1px solid rgba(108, 117, 125, 0.3);

			}
		}

				padding: 1rem 0.75rem 1.5rem !important;
			}
			main > .d-flex.justify-content-between.align-items-center {
				align-items: center !important;

				gap: 0.5rem !important;
				grid-template-columns: minmax(0, 1fr) auto;
			}
			main > .d-flex.justify-content-between.align-items-center > .d-flex,
			main > .d-flex.justify-content-between.align-items-center > form {

				flex-wrap: wrap;

</div>

<th:block th:fragment="scripts">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		const wholeSummerThemeMedia = window.matchMedia('(prefers-color-scheme: dark)');

		function resolveWholeSummerTheme(preference) {
			return preference === 'system'
					? (wholeSummerThemeMedia.matches ? 'dark' : 'light')
					: preference;
		}

		function applyWholeSummerTheme(preference, persist = false) {
			const normalizedPreference = ['light', 'dark', 'system'].includes(preference)
					? preference
					: 'system';
			if (persist) {
				try {
					localStorage.setItem('wholeSummerThemeMode', normalizedPreference);
				} catch (error) {
					// The selected theme still applies for the current page when browser storage is unavailable.
				}
			}
			const theme = resolveWholeSummerTheme(normalizedPreference);
			document.documentElement.dataset.bsTheme = theme;
			document.querySelectorAll('[data-theme-option]').forEach((input) => {
				input.checked = input.value === normalizedPreference;
			});
			window.dispatchEvent(new CustomEvent('wholeSummerThemeChanged', {
				detail: { theme, preference: normalizedPreference }
			}));
		}

		function storedWholeSummerThemePreference() {
			try {
				return localStorage.getItem('wholeSummerThemeMode') || 'system';
			} catch (error) {
				return 'system';
			}
		}

		document.querySelectorAll('.page-help-popover').forEach((popover) => {
			const text = popover.textContent.replace(/\\n/g, '\n');
			popover.textContent = '';
			text.split('\n').forEach((line, index) => {
				if (index > 0) {
					popover.appendChild(document.createElement('br'));
				}
				popover.appendChild(document.createTextNode(line));
			});
		});

		document.querySelectorAll('[data-theme-option]').forEach((input) => {
			input.addEventListener('change', () => applyWholeSummerTheme(input.value, true));
		});
		applyWholeSummerTheme(storedWholeSummerThemePreference());
		wholeSummerThemeMedia.addEventListener('change', () => {
			if (storedWholeSummerThemePreference() === 'system') {
				applyWholeSummerTheme('system');
			}
		});

		const overdueReminderDaysInput = document.querySelector('[data-overdue-reminder-days]');
		if (overdueReminderDaysInput) {
			overdueReminderDaysInput.value = overdueReminderDaysInput.dataset.currentValue || '3';
		}

		const wholeSummerMobileQuery = window.matchMedia('(max-width: 575.98px)');
		const wholeSummerTabletQuery = window.matchMedia(
			'(min-width: 576px) and (max-width: 991.98px) and (orientation: portrait), '
			+ '(min-width: 768px) and (max-width: 1199.98px) and (orientation: landscape)'
		);

		document.querySelectorAll('.responsive-login-title').forEach((title) => {
			const titleText = title.textContent.trim();
			const englishTitle = 'Whole Summer';
			if (!titleText.endsWith(englishTitle)) {
				return;
			}
			const chineseTitle = titleText.slice(0, -englishTitle.length).trim();
			title.textContent = '';
			const chineseSpan = document.createElement('span');
			chineseSpan.textContent = chineseTitle;
			const englishSpan = document.createElement('span');
			englishSpan.className = 'login-title-english';
			englishSpan.textContent = `${chineseTitle ? ' ' : ''}${englishTitle}`;
			title.append(chineseSpan, englishSpan);
		});

		function shortenBackupFileNames() {
			document.querySelectorAll('.backup-file-name[data-file-name]').forEach((cell) => {
				const fileName = cell.dataset.fileName || '';
				const compact = wholeSummerMobileQuery.matches || wholeSummerTabletQuery.matches;
				const maximumLength = wholeSummerMobileQuery.matches ? 18 : 28;
				if (!compact || fileName.length <= maximumLength) {
					cell.textContent = fileName;
					return;
				}
				const suffixLength = Math.min(10, Math.floor(maximumLength * 0.4));
				const prefixLength = maximumLength - suffixLength - 3;
				cell.textContent = `${fileName.slice(0, prefixLength)}...${fileName.slice(-suffixLength)}`;
			});
		}
		shortenBackupFileNames();
		wholeSummerMobileQuery.addEventListener('change', shortenBackupFileNames);
		wholeSummerTabletQuery.addEventListener('change', shortenBackupFileNames);

		const secondaryTableLabels = new Set([
			'性別', '學校', '電話', 'Email', '科目', '說明', '備註', '教師備註',
			'教師', '學生數', '提交時間', '建立時間', '更新時間', '加入時間', '發派日期',
			'當日課程', '上班時間', '下班時間', '適用年級', '開課班級',
			'授課班級數'
		]);

		document.querySelectorAll('table:not(.schedule-table)').forEach((table) => {
			table.querySelectorAll('thead th').forEach((header) => {
				const label = header.textContent.trim();
				if (header.colSpan !== 1 || !secondaryTableLabels.has(label)) {
					return;
				}
				const columnIndex = header.cellIndex;
				header.classList.add('mobile-secondary-column');
				table.querySelectorAll('tbody tr').forEach((row) => {
					if (row.cells[columnIndex] && row.cells[columnIndex].colSpan === 1) {
						row.cells[columnIndex].classList.add('mobile-secondary-column');
					}
				});
			});
		});

		document.querySelectorAll('.schedule-table').forEach((table) => {
			table.closest('.table-responsive')?.classList.add('mobile-schedule-scroll');
		});

		document.querySelectorAll('.row.g-3').forEach((row) => {
			const columns = Array.from(row.children).filter((child) =>
				child.matches('.col, [class*="col-"]'));
			if (columns.length < 2) {
				return;
			}
			const cardLikeColumns = columns.every((column) =>
				column.querySelector(':scope > .bg-white.border.rounded, :scope > .border.rounded.bg-white')
				|| column.querySelector(':scope > .text-secondary.small'));
			if (cardLikeColumns) {
				row.classList.add('mobile-stat-grid');
			}
		});

		const detailPagePattern = /^\/(students|teachers|classes|exams|homeworks)\/\d+\/?$/;
		if (detailPagePattern.test(window.location.pathname)) {
			const main = document.querySelector('main');
			main?.classList.add('mobile-detail-page');
			main?.querySelectorAll(':scope > section').forEach((section, index) => {
				section.classList.add('mobile-collapsible-section');
				let header = Array.from(section.children).find((child) => child.querySelector('h2'));
				if (!header) {
					header = document.createElement('div');
					header.className = 'mobile-collapse-header mobile-generated-section-title';
					const heading = document.createElement('h2');
					heading.className = 'h5';
					heading.textContent = '基本資料';
					header.appendChild(heading);
					section.prepend(header);
				} else {
					header.classList.add('mobile-collapse-header');
				}

				const content = document.createElement('div');
				content.className = 'mobile-collapse-content';
				Array.from(section.children)
					.filter((child) => child !== header)
					.forEach((child) => content.appendChild(child));
				section.appendChild(content);

				const toggle = document.createElement('button');
				toggle.type = 'button';
				toggle.className = 'mobile-collapse-toggle';
				toggle.setAttribute('aria-label', '展開或收合區塊');
				toggle.textContent = '⌃';
				header.appendChild(toggle);
				if (index > 0) {
					section.classList.add('mobile-collapsed');
				}
				header.addEventListener('click', (event) => {
					if (!wholeSummerMobileQuery.matches
							|| event.target.closest('a, form, input, select, textarea')) {
						return;
					}
					section.classList.toggle('mobile-collapsed');
				});
			});
		}

		function closeMobilePopovers(except = null) {
			document.querySelectorAll('.page-help-wrapper.mobile-open, .attendance-note-wrapper.mobile-open')
				.forEach((wrapper) => {
					if (wrapper !== except) {
						wrapper.classList.remove('mobile-open');
					}
				});
		}

		document.querySelectorAll('.page-help-wrapper, .attendance-note-wrapper').forEach((wrapper) => {
			wrapper.addEventListener('click', (event) => {
				if (!wholeSummerMobileQuery.matches) {
					return;
				}
				event.stopPropagation();
				const opening = !wrapper.classList.contains('mobile-open');
				closeMobilePopovers(wrapper);
				wrapper.classList.toggle('mobile-open', opening);
			});
		});
		document.addEventListener('click', () => closeMobilePopovers());
		document.addEventListener('keydown', (event) => {
			if (event.key === 'Escape') {
				closeMobilePopovers();
			}
		});

		function showMobileConfirm(message, onConfirm) {
			let modalElement = document.getElementById('mobileConfirmDialog');
			if (!modalElement) {
				modalElement = document.createElement('div');
				modalElement.id = 'mobileConfirmDialog';
				modalElement.className = 'modal fade mobile-confirm-dialog';
				modalElement.tabIndex = -1;
				modalElement.setAttribute('aria-hidden', 'true');
				modalElement.innerHTML = `
					<div class="modal-dialog">
						<div class="modal-content">
							<div class="modal-header">
								<h2 class="modal-title fs-5">請確認操作</h2>
								<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
							</div>
							<div class="modal-body"></div>
							<div class="modal-footer">
								<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
								<button type="button" class="btn btn-danger mobile-confirm-submit">確認</button>
							</div>
						</div>
					</div>`;
				document.body.appendChild(modalElement);
			}

			modalElement.querySelector('.modal-body').textContent = message;
			const confirmButton = modalElement.querySelector('.mobile-confirm-submit');
			const modal = bootstrap.Modal.getOrCreateInstance(modalElement);
			confirmButton.onclick = () => {
				modal.hide();
				onConfirm();
			};
			modal.show();
		}

		document.addEventListener('submit', (event) => {
			if (!wholeSummerMobileQuery.matches) {
				return;
			}
			const form = event.target;
			const submitHandler = form.getAttribute('onsubmit') || '';
			const messageMatch = submitHandler.match(/confirm\((['"`])([\s\S]*?)\1\)/);
			if (!messageMatch) {
				return;
			}
			event.preventDefault();
			event.stopImmediatePropagation();
			showMobileConfirm(messageMatch[2], () => {
				form.removeAttribute('onsubmit');
				HTMLFormElement.prototype.submit.call(form);
			});
		}, true);

		document.addEventListener('click', (event) => {
			if (!wholeSummerMobileQuery.matches) {
				return;
			}
			const target = event.target.closest('[onclick*="confirm("]');
			if (!target) {
				return;
			}
			const clickHandler = target.getAttribute('onclick') || '';
			const messageMatch = clickHandler.match(/confirm\((['"`])([\s\S]*?)\1\)/);
			if (!messageMatch) {
				return;
			}
			event.preventDefault();
			event.stopImmediatePropagation();
			showMobileConfirm(messageMatch[2], () => {
				target.removeAttribute('onclick');
				target.click();
			});
		}, true);
	</script>
</th:block>
</body>
</html>
