<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<style>
		.notification-scroll {
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
			max-height: 26rem;
			overflow-y: auto;
			padding: 0.25rem 0.35rem 0.25rem 0.1rem;
		}
		.notification-card {
			border-left: 0.35rem solid;
			flex: 0 0 auto;
			width: 100%;
		}
		.notification-homework { border-left-color: #f0ad00; }
		.notification-exam { border-left-color: #0d6efd; }
		.notification-tuition { border-left-color: #dc3545; }
		.notification-update { border-left-color: #6f42c1; }
		.notification-birthday { border-left-color: #d63384; }
		.notification-makeup { border-left-color: #fd7e14; }
	</style>
	<div th:if="${message}" class="alert alert-success" th:text="${message}">已完成</div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">發生錯誤</div>

	<div th:if="${updateChecking}" id="updateCheckingNotice" class="alert alert-info py-2">
		正在背景檢查 WholeSummer 更新。
	</div>

	<section class="bg-white border rounded p-4 mb-4">
		<div>
			<div class="page-title-line mb-2">
				<h1 class="h3 mb-0">補習班管理後台</h1>
			</div>
		</div>
	</section>

	<section class="row g-3">
		<div class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/students}">
				<div class="card-body">
					<h2 class="h5">學生管理</h2>
					<p class="text-secondary mb-0">新增、編輯與停用學生資料。</p>
				</div>
			</a>
		</div>
		<div class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/classes}">
				<div class="card-body">
					<h2 class="h5">班級管理</h2>
					<p class="text-secondary mb-0">建立班級並管理班級學生。</p>
				</div>
			</a>
		</div>
		<div class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/subjects}">
				<div class="card-body">
					<h2 class="h5">科目管理</h2>
					<p class="text-secondary mb-0">維護數學、英文等科目。</p>
				</div>
			</a>
		</div>
		<div class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/exams}">
				<div class="card-body">
					<h2 class="h5">測驗與分數</h2>
					<p class="text-secondary mb-0">建立測驗並登記學生成績。</p>
				</div>
			</a>
		</div>
		<div class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/homeworks}">
				<div class="card-body">
					<h2 class="h5">作業管理</h2>
					<p class="text-secondary mb-0">建立作業並追蹤學生繳交狀態。</p>
				</div>
			</a>
		</div>
		<div th:if="${teacherPermissions.manageTuition}" class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/tuition}">
				<div class="card-body">
					<h2 class="h5">學費管理</h2>
					<p class="text-secondary mb-0">記錄學生應繳費用與繳費狀況。</p>
				</div>
			</a>
		</div>
		<div class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/salary}">
				<div class="card-body">
					<h2 class="h5">薪資查詢</h2>
					<p class="text-secondary mb-0">查看當月累積工時與薪資。</p>
				</div>
			</a>
		</div>
		<div class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/settings}">
				<div class="card-body">
					<h2 class="h5">系統設定</h2>
					<p class="text-secondary mb-0">調整畫面模式、個人密碼與其他選項。</p>
				</div>
			</a>
		</div>
		<div th:unless="${homeDirectorView}" class="col-md-6 col-lg-3">
			<a class="card text-decoration-none text-dark h-100" th:href="@{/attendance/my}">
				<div class="card-body">
					<h2 class="h5">前往打卡</h2>
					<p class="text-secondary mb-0">快速記錄今日上班、下班與請假。</p>
				</div>
			</a>
		</div>
	</section>

	<section class="mt-4">
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">通知</h2>
			<span class="badge text-bg-primary" th:text="${#lists.size(notifications)}">0</span>
		</div>
		<div th:if="${#lists.isEmpty(notifications)}"
				class="bg-white border rounded text-center text-secondary py-4">
			目前沒有通知。
		</div>
		<div th:unless="${#lists.isEmpty(notifications)}" class="notification-scroll">
			<a class="card text-decoration-none text-dark notification-card"
					th:each="notification : ${notifications}"
					th:classappend="${'notification-' + notification.type}"
					th:href="${notification.link}">
				<div class="card-body">
					<div class="d-flex justify-content-between align-items-start gap-2 mb-2">
						<span class="badge"
								th:classappend="${notification.type == 'homework' ? 'text-bg-warning' :
										(notification.type == 'exam' ? 'text-bg-primary' :
										(notification.type == 'tuition' ? 'text-bg-danger' :
										(notification.type == 'update' ? 'text-bg-info' :
										(notification.type == 'makeup' ? 'text-bg-warning' : 'text-bg-success'))))}"
								th:text="${notification.typeLabel}">通知</span>
						<span class="small text-secondary"
								th:text="${#temporals.format(notification.date, 'yyyy/MM/dd')}">2026/01/01</span>
					</div>
					<h3 class="h6 mb-2" th:text="${notification.title}">通知標題</h3>
					<div class="small text-secondary mb-2" th:text="${notification.detail}">詳細資訊</div>
					<div class="small" th:text="${notification.supplementary}">補充資訊</div>
				</div>
			</a>
		</div>
	</section>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
<script>
	if (document.getElementById('updateCheckingNotice')) {
		window.setTimeout(() => window.location.reload(), 3000);
	}

</script>
</body>
</html>
