<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div>
			<div class="page-title-line mb-1">
				<h1 class="h3 mb-0">教師管理</h1>
				<span th:replace="~{fragments/layout :: help('管理教師資料，並查看教師授課班級與授課科目。')}"></span>
			</div>
		</div>
		<div class="d-flex align-items-center gap-2">
			<a class="btn btn-outline-success" th:href="@{/teachers/attendance}">教師出勤</a>
			<a th:if="${teacherPermissions.createTeacher}" class="btn btn-primary" th:href="@{/teachers/new}">新增教師</a>
		</div>
	</div>

	<section class="mb-4">
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">任教中</h2>
			<span class="badge text-bg-success" th:text="${#lists.size(activeTeachers)}">0</span>
		</div>
		<div class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>姓名</th>
					<th>暱稱</th>
					<th>職位</th>
					<th th:if="${teacherPermissions.teacherSensitiveView}">電話</th>
					<th th:if="${teacherPermissions.teacherSensitiveView}">Email</th>
					<th>授課班級數</th>
					<th class="text-end">操作</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(activeTeachers)}">
					<td th:colspan="${teacherPermissions.teacherSensitiveView ? 7 : 5}"
							class="text-center text-secondary py-4">目前尚無任教中教師</td>
				</tr>
				<tr th:each="teacher : ${activeTeachers}">
					<td>
						<a th:href="@{/teachers/{slug}(slug=${teacher.urlSlug})}" th:text="${teacher.name}">教師姓名</a>
					</td>
					<td th:text="${teacher.nickname ?: '-'}">-</td>
					<td th:text="${teacher.position.displayName}">教師</td>
					<td th:if="${teacherPermissions.teacherSensitiveView}" th:text="${teacher.phone ?: '-'}">-</td>
					<td th:if="${teacherPermissions.teacherSensitiveView}" th:text="${teacher.email ?: '-'}">-</td>
					<td th:text="${classCounts[teacher.id] ?: 0}">0</td>
					<td class="text-end">
						<div th:if="${teacherPermissions.teacherUpdate or teacher.id == currentTeacherId}"
								class="d-inline-flex gap-2">
							<a th:if="${teacherPermissions.teacherUpdate or teacher.id == currentTeacherId}"
									class="btn btn-sm btn-outline-primary"
									th:href="@{/teachers/{slug}/edit(slug=${teacher.urlSlug})}">編輯</a>
							<form th:if="${teacherPermissions.teacherUpdate}"
									th:action="@{/teachers/{slug}/left(slug=${teacher.urlSlug})}"
									method="post" onsubmit="return confirm('確定要將這位教師設為已離職嗎？');">
								<button class="btn btn-sm btn-outline-danger" type="submit">離職</button>
							</form>
							<form th:if="${teacherPermissions.teacherUpdate}"
									th:action="@{/teachers/{slug}/delete(slug=${teacher.urlSlug})}"
									method="post" onsubmit="return confirm('確定要永久刪除這位教師嗎？班級與科目中的教師關聯會一併移除。');">
								<button class="btn btn-sm btn-outline-danger" type="submit">刪除</button>
							</form>
						</div>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>

	<section>
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">已離職</h2>
			<span class="badge text-bg-danger" th:text="${#lists.size(leftTeachers)}">0</span>
		</div>
		<div class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>姓名</th>
					<th>暱稱</th>
					<th>職位</th>
					<th th:if="${teacherPermissions.teacherSensitiveView}">電話</th>
					<th th:if="${teacherPermissions.teacherSensitiveView}">Email</th>
					<th>授課班級數</th>
					<th class="text-end">操作</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(leftTeachers)}">
					<td th:colspan="${teacherPermissions.teacherSensitiveView ? 7 : 5}"
							class="text-center text-secondary py-4">目前尚無已離職教師</td>
				</tr>
				<tr th:each="teacher : ${leftTeachers}">
					<td>
						<a th:href="@{/teachers/{slug}(slug=${teacher.urlSlug})}" th:text="${teacher.name}">教師姓名</a>
					</td>
					<td th:text="${teacher.nickname ?: '-'}">-</td>
					<td th:text="${teacher.position.displayName}">教師</td>
					<td th:if="${teacherPermissions.teacherSensitiveView}" th:text="${teacher.phone ?: '-'}">-</td>
					<td th:if="${teacherPermissions.teacherSensitiveView}" th:text="${teacher.email ?: '-'}">-</td>
					<td th:text="${classCounts[teacher.id] ?: 0}">0</td>
					<td class="text-end">
						<div th:if="${teacherPermissions.teacherUpdate or teacher.id == currentTeacherId}"
								class="d-inline-flex gap-2">
							<a th:if="${teacherPermissions.teacherUpdate or teacher.id == currentTeacherId}"
									class="btn btn-sm btn-outline-primary"
									th:href="@{/teachers/{slug}/edit(slug=${teacher.urlSlug})}">編輯</a>
							<form th:if="${teacherPermissions.teacherUpdate}"
									th:action="@{/teachers/{slug}/reinstate(slug=${teacher.urlSlug})}"
									method="post">
								<button class="btn btn-sm btn-outline-success" type="submit">復職</button>
							</form>
							<form th:if="${teacherPermissions.teacherUpdate}"
									th:action="@{/teachers/{slug}/delete(slug=${teacher.urlSlug})}"
									method="post" onsubmit="return confirm('確定要永久刪除這位教師嗎？班級與科目中的教師關聯會一併移除。');">
								<button class="btn btn-sm btn-outline-danger" type="submit">刪除</button>
							</form>
						</div>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
