<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div class="page-title-line mb-1">
			<h1 class="h3 mb-0">
				<span>班級點名 - </span>
				<span th:text="${classRoom.displayName}">班級名稱</span>
			</h1>
			<span th:replace="~{fragments/layout :: help('登記班級學生出缺席\n∙ 日期：切換要點名的日期\n∙ 出席狀態：可選出席、遲到、缺席、請假\n∙ 到班時間／離班時間：出席或遲到時可填寫，缺席或請假免填\n∙ 備註：可記錄遲到原因或請假說明\n儲存後會更新同一天的既有紀錄，不會重複建立。')}"></span>
		</div>
		<div class="d-flex align-items-center gap-2">
			<a class="btn btn-outline-secondary" th:href="@{/classes/{slug}(slug=${classRoom.urlSlug})}">返回班級</a>
		</div>
	</div>

	<div class="mb-4">
		<form id="attendanceDateForm" class="row g-2 align-items-end" method="get"
				th:action="@{/classes/{slug}/attendance(slug=${classRoom.urlSlug})}">
			<div class="col-md-4 col-lg-3">
				<label for="attendanceDatePicker" class="form-label">點名日期</label>
				<div class="d-flex align-items-center gap-2">
					<a class="btn btn-sm btn-outline-secondary rounded-circle d-inline-flex align-items-center justify-content-center p-0"
							style="width: 1.5rem; min-width: 1.5rem; height: 1.5rem; line-height: 1; flex: 0 0 1.5rem;"
							th:href="@{/classes/{slug}/attendance(slug=${classRoom.urlSlug},date=${#temporals.format(previousAttendanceDate, 'yyyy-MM-dd')})}">‹</a>
					<input id="attendanceDatePicker" name="date" class="form-control text-center" type="date"
							th:value="${#temporals.format(attendanceForm.attendanceDate, 'yyyy-MM-dd')}"
							th:attr="data-class-weekdays=${attendanceWeekdayData}">
					<a class="btn btn-sm btn-outline-secondary rounded-circle d-inline-flex align-items-center justify-content-center p-0"
							style="width: 1.5rem; min-width: 1.5rem; height: 1.5rem; line-height: 1; flex: 0 0 1.5rem;"
							th:href="@{/classes/{slug}/attendance(slug=${classRoom.urlSlug},date=${#temporals.format(nextAttendanceDate, 'yyyy-MM-dd')})}">›</a>
				</div>
				<div th:unless="${classDay}" class="form-text text-danger">此日期不是上課日</div>
			</div>
		</form>
	</div>

	<form th:action="@{/classes/{slug}/attendance(slug=${classRoom.urlSlug})}" th:object="${attendanceForm}" method="post">
		<input type="hidden" th:field="*{attendanceDate}">

		<section class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>學生姓名</th>
					<th>年級</th>
					<th style="width: 180px;">出缺席</th>
					<th style="width: 130px;">到班時間</th>
					<th style="width: 130px;">離班時間</th>
					<th>備註</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(attendanceForm.entries)}">
					<td colspan="6" class="text-center text-secondary py-4">此班級目前沒有可點名的學生</td>
				</tr>
				<tr th:each="entry, iterStat : *{entries}">
					<td>
						<input type="hidden" th:field="*{entries[__${iterStat.index}__].studentId}">
						<span th:text="${entry.studentName}">學生姓名</span>
					</td>
					<td th:text="${entry.studentGrade ?: '-'}">-</td>
					<td>
						<select class="form-select form-select-sm" data-attendance-status
								th:field="*{entries[__${iterStat.index}__].status}"
								th:disabled="${!classDay}">
							<option th:each="status : ${statusOptions}"
									th:value="${status}"
									th:text="${status.displayName}">出席</option>
						</select>
					</td>
					<td>
						<input class="form-control form-control-sm" type="time"
								th:field="*{entries[__${iterStat.index}__].checkInTime}"
								th:disabled="${!classDay}"
								data-attendance-time
								aria-label="到班時間">
					</td>
					<td>
						<input class="form-control form-control-sm" type="time"
								th:field="*{entries[__${iterStat.index}__].checkOutTime}"
								th:disabled="${!classDay}"
								data-attendance-time
								aria-label="離班時間">
					</td>
					<td>
						<input class="form-control form-control-sm" type="text"
								th:field="*{entries[__${iterStat.index}__].note}"
								th:disabled="${!classDay}"
								placeholder="可留空">
					</td>
				</tr>
				</tbody>
			</table>
		</section>

		<div class="d-flex justify-content-end gap-2 mt-3">
			<a class="btn btn-outline-secondary" th:href="@{/classes/{slug}(slug=${classRoom.urlSlug})}">取消</a>
			<button class="btn btn-primary" type="submit"
					th:disabled="${!classDay || #lists.isEmpty(attendanceForm.entries)}">儲存點名</button>
		</div>
	</form>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
<script>
	const attendanceDatePicker = document.getElementById('attendanceDatePicker');
	const attendanceDateForm = document.getElementById('attendanceDateForm');

	if (attendanceDatePicker && attendanceDateForm) {
		attendanceDatePicker.addEventListener('change', () => {
			if (attendanceDatePicker.value) {
				attendanceDateForm.submit();
			}
		});
	}

	function syncAttendanceTimeFields(statusSelect) {
		const row = statusSelect.closest('tr');
		if (!row) {
			return;
		}
		const disabledByStatus = statusSelect.value === 'ABSENT' || statusSelect.value === 'LEAVE';
		row.querySelectorAll('[data-attendance-time]').forEach((input) => {
			input.disabled = statusSelect.disabled || disabledByStatus;
			if (disabledByStatus) {
				input.value = '';
			}
		});
	}

	document.querySelectorAll('[data-attendance-status]').forEach((select) => {
		syncAttendanceTimeFields(select);
		select.addEventListener('change', () => syncAttendanceTimeFields(select));
	});
</script>
</body>
</html>
