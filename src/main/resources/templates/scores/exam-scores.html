<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div>
			<div class="page-title-line mb-1">
				<h1 class="h3 mb-0">分數登記</h1>
				<span th:replace="~{fragments/layout :: help('登錄學生測驗成績\n∙ 計分測驗請輸入分數\n∙ 0 分代表缺考\n∙ 課堂練習以勾選切換已完成或未完成。')}"></span>
			</div>
			<p class="text-secondary mb-0">
				<span th:text="${exam.name}">測驗名稱</span>
				<span> / </span>
				<span th:text="${exam.classRoom.displayName}">班級</span>
			</p>
		</div>
		<div class="d-flex align-items-center gap-2">
			<a class="btn btn-outline-secondary" th:href="@{/exams/{id}(id=${exam.id})}">返回測驗</a>
		</div>
	</div>

	<section class="bg-white border rounded p-4 mb-3">
		<div class="row g-3">
			<div class="col-md-4">
				<div class="text-secondary small">科目</div>
				<div th:text="${exam.subject.name}">科目</div>
			</div>
			<div class="col-md-4">
				<div class="text-secondary small">測驗日期</div>
				<div th:text="${#temporals.format(exam.examDate, 'yyyy-MM-dd')}">2026-01-01</div>
			</div>
			<div class="col-md-4">
				<div class="text-secondary small">滿分</div>
				<div th:text="${exam.fullScore == 0 ? '不計分' : exam.fullScore}">100</div>
			</div>
		</div>
	</section>

	<form th:action="@{/exams/{id}/scores(id=${exam.id})}" th:object="${scoreForm}" method="post">
		<section class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>學生姓名</th>
					<th>年級</th>
					<th th:if="${exam.fullScore > 0}" style="width: 160px;">分數</th>
					<th th:if="${exam.fullScore == 0}" style="width: 160px;">是否完成</th>
					<th>備註</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(scoreForm.entries)}">
					<td colspan="4" class="text-center text-secondary py-4">此班級目前沒有學生</td>
				</tr>
				<tr th:each="entry, stat : *{entries}">
					<td>
						<input type="hidden" th:field="*{entries[__${stat.index}__].studentId}">
						<input type="hidden" th:field="*{entries[__${stat.index}__].studentName}">
						<input type="hidden" th:field="*{entries[__${stat.index}__].studentGrade}">
						<span th:text="*{entries[__${stat.index}__].studentName}">學生</span>
					</td>
					<td th:text="${entry.studentGrade ?: '-'}">-</td>
					<td th:if="${exam.fullScore > 0}">
						<input type="number" min="0" th:max="${exam.fullScore}" class="form-control score-input"
								th:field="*{entries[__${stat.index}__].score}">
					</td>
					<td th:if="${exam.fullScore == 0}">
						<div class="form-check">
							<input class="form-check-input" type="checkbox"
									th:field="*{entries[__${stat.index}__].completed}">
							<label class="form-check-label"
									th:for="${#ids.prev('entries' + stat.index + '.completed')}"
									th:text="${entry.completed ? '已完成' : '未完成'}">未完成</label>
						</div>
					</td>
					<td>
						<input type="text" class="form-control" th:field="*{entries[__${stat.index}__].comment}">
					</td>
				</tr>
				</tbody>
			</table>
		</section>

		<div class="d-flex justify-content-end gap-2 mt-4">
			<a class="btn btn-outline-secondary" th:href="@{/exams/{id}(id=${exam.id})}">取消</a>
			<button class="btn btn-primary" type="submit" th:disabled="${#lists.isEmpty(scoreForm.entries)}"
					th:text="${exam.fullScore == 0 ? '儲存完成狀態' : '儲存分數'}">儲存分數</button>
		</div>
	</form>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
<script th:if="${exam.fullScore == 0}">
	document.querySelectorAll('input[type="checkbox"][name$=".completed"]').forEach((checkbox) => {
		const label = checkbox.closest('.form-check')?.querySelector('.form-check-label');
		const refreshLabel = () => {
			if (label) {
				label.textContent = checkbox.checked ? '已完成' : '未完成';
			}
		};
		checkbox.addEventListener('change', refreshLabel);
		refreshLabel();
	});
</script>
</body>
</html>
