<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<style>
	.attendance-time-input,
	.attendance-status-input,
	.attendance-note-input { width: 100%; max-width: none; }
</style>
<body class="bg-light"><nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container py-4">
<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
	<h1 class="h3 mb-0">學生出席</h1>
	<form method="get" th:action="@{/student-leaves}" class="d-flex gap-2"><a class="btn btn-outline-secondary" th:href="@{/student-leaves(date=${attendanceDate.minusDays(1)})}">‹</a><input class="form-control" type="date" name="date" th:value="${attendanceDate}" onchange="this.form.submit()"><a class="btn btn-outline-secondary" th:href="@{/student-leaves(date=${attendanceDate.plusDays(1)})}">›</a></form>
</div>
<div class="row g-4 align-items-start">
	<section class="col-xl-6">
		<div class="bg-white border rounded p-4"><h2 class="h5 mb-3" th:text="${#temporals.format(attendanceDate, 'yyyy年MM月dd日')} + ' 學生出席狀況'">學生出席狀況</h2>
		<form th:action="@{/student-leaves/attendance}" th:object="${attendanceForm}" method="post"><input type="hidden" th:field="*{attendanceDate}">
			<div th:if="${#lists.isEmpty(attendanceForm.entries)}" class="border rounded text-center text-secondary py-5">當日沒有學生課程。</div>
			<div th:unless="${#lists.isEmpty(attendanceForm.entries)}" class="vstack gap-3"><div th:each="entry, stat : ${attendanceForm.entries}" class="border rounded p-3">
				<input type="hidden" th:field="*{entries[__${stat.index}__].studentId}"><div class="d-flex flex-wrap align-items-baseline gap-2 mb-2"><span class="fs-5 fw-semibold" th:text="${entry.studentName}">王小明 / John</span><span class="fs-5" th:text="${entry.studentGrade ?: '-'}">高一</span><span class="small text-secondary" th:text="${entry.scheduleText}">15:00~19:00</span></div>
				<div class="row g-2"><div class="col-6 col-lg-3"><label class="form-label small">到班時間</label><input class="form-control form-control-sm attendance-time-input" type="time" th:field="*{entries[__${stat.index}__].checkInTime}"></div><div class="col-6 col-lg-3"><label class="form-label small">簽退時間</label><input class="form-control form-control-sm attendance-time-input" type="time" th:field="*{entries[__${stat.index}__].checkOutTime}"></div><div class="col-6 col-lg-3"><label class="form-label small">狀態</label><select class="form-select form-select-sm attendance-status-input" th:field="*{entries[__${stat.index}__].status}"><option th:each="status : ${statusOptions}" th:value="${status}" th:text="${status.displayName}">出席</option></select></div><div class="col-6 col-lg-3"><label class="form-label small">備註</label><input class="form-control form-control-sm attendance-note-input" type="text" th:field="*{entries[__${stat.index}__].note}"></div></div>
			</div><div class="text-end"><button class="btn btn-primary">儲存出席</button></div></div>
		</form></div>
	</section>
	<section class="col-xl-6"><div class="bg-white border rounded p-4">
		<div class="d-flex justify-content-between align-items-center mb-3"><h2 class="h5 mb-0">學生請假</h2><span class="badge text-bg-primary" th:text="${#lists.size(pendingLeaveRequests) + ' 筆待審核'}">0 筆待審核</span></div>
		<h3 class="h6 mb-2">待審核</h3><div th:if="${#lists.isEmpty(pendingLeaveRequests)}" class="border rounded text-center text-secondary py-3 mb-4">目前沒有待審核請假。</div>
		<div th:unless="${#lists.isEmpty(pendingLeaveRequests)}" class="table-responsive mb-4"><table class="table table-sm table-hover align-middle"><thead class="table-light"><tr><th>學生／課程</th><th>時間</th><th>原因</th><th></th></tr></thead><tbody><tr th:each="request : ${pendingLeaveRequests}"><td><div th:text="${request.student.displayName}">學生</div><div class="small text-secondary" th:text="${request.classRoom.displayName}">課程</div></td><td class="small" th:text="${#temporals.format(request.scheduledStartAt, 'MM/dd HH:mm') + ' - ' + #temporals.format(request.scheduledEndAt, 'HH:mm')}">日期</td><td th:text="${request.reason ?: '-'}">原因</td><td><form th:action="@{/student-leaves/{id}/confirm(id=${request.id})}" method="post" onsubmit="return confirm('確認這筆學生請假嗎？');"><button class="btn btn-primary btn-sm">確認</button></form></td></tr></tbody></table></div>
		<h3 class="h6 mb-2">已確認之請假</h3><div th:if="${#lists.isEmpty(confirmedLeaveRequests)}" class="border rounded text-center text-secondary py-3">目前沒有已確認請假。</div>
		<div th:unless="${#lists.isEmpty(confirmedLeaveRequests)}" class="table-responsive"><table class="table table-sm table-hover align-middle"><thead class="table-light"><tr><th>學生／課程</th><th>時間</th><th>確認人員</th></tr></thead><tbody><tr th:each="request : ${confirmedLeaveRequests}"><td><div th:text="${request.student.displayName}">學生</div><div class="small text-secondary" th:text="${request.classRoom.displayName}">課程</div></td><td class="small" th:text="${#temporals.format(request.scheduledStartAt, 'MM/dd HH:mm') + ' - ' + #temporals.format(request.scheduledEndAt, 'HH:mm')}">日期</td><td th:text="${request.reviewedByTeacher == null ? '-' : request.reviewedByTeacher.displayName}">教師</td></tr></tbody></table></div>
	</div></section>
</div></main><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script th:replace="~{fragments/layout :: scripts}"></script></body></html>
