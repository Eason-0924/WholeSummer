<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}">已完成</div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">發生錯誤</div>

	<section class="bg-white border rounded p-4 mb-4">
		<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
			<div class="page-title-line">
				<h1 class="h3 mb-0">學生請假</h1>
				<span th:replace="~{fragments/layout :: help('管理家長從 LINE LIFF 送出的學生請假申請。\n∙ 確認：將待審核請假標記為已確認，並發送 LINE 通知給家長。')}"></span>
			</div>
			<span class="badge text-bg-primary"
					th:text="${#lists.size(pendingLeaveRequests) + ' 筆待審核'}">0 筆待審核</span>
		</div>

		<h2 class="h5 mb-3">待審核</h2>
		<div th:if="${#lists.isEmpty(pendingLeaveRequests)}"
				class="border rounded text-center text-secondary py-4 mb-4">
			目前沒有待審核請假。
		</div>
		<div th:unless="${#lists.isEmpty(pendingLeaveRequests)}" class="table-responsive mb-4">
			<table class="table table-hover align-middle">
				<thead class="table-light">
					<tr>
						<th>學生</th>
						<th>課程</th>
						<th>時間</th>
						<th>請假原因</th>
						<th>申請人</th>
						<th class="text-end">操作</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="request : ${pendingLeaveRequests}">
						<td th:text="${request.student.displayName}">學生</td>
						<td th:text="${request.classRoom.displayName}">課程</td>
						<td>
							<div th:text="${#temporals.format(request.scheduledStartAt, 'yyyy/MM/dd HH:mm') + ' - ' + #temporals.format(request.scheduledEndAt, 'HH:mm')}">
								2026/01/01 18:00 - 20:00
							</div>
						</td>
						<td>
							<div th:text="${request.reason ?: '-'}">病假</div>
						</td>
						<td>
							<div th:text="${request.parentRelation ?: '-'}">媽媽</div>
							<div class="small text-secondary" th:text="${request.requesterDisplayName ?: '-'}">LINE 名稱</div>
						</td>
						<td class="text-end">
							<form th:action="@{/student-leaves/{id}/confirm(id=${request.id})}" method="post" class="d-inline"
									onsubmit="return confirm('確認這筆學生請假嗎？');">
								<button type="submit" class="btn btn-primary btn-sm">確認</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

		<h2 class="h5 mb-3">已確認之請假</h2>
		<div th:if="${#lists.isEmpty(confirmedLeaveRequests)}"
				class="border rounded text-center text-secondary py-4">
			目前沒有已確認請假。
		</div>
		<div th:unless="${#lists.isEmpty(confirmedLeaveRequests)}" class="table-responsive">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
					<tr>
						<th>學生</th>
						<th>課程</th>
						<th>時間</th>
						<th>請假原因</th>
						<th>確認人員</th>
						<th>確認時間</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="request : ${confirmedLeaveRequests}">
						<td th:text="${request.student.displayName}">學生</td>
						<td th:text="${request.classRoom.displayName}">課程</td>
						<td th:text="${#temporals.format(request.scheduledStartAt, 'yyyy/MM/dd HH:mm') + ' - ' + #temporals.format(request.scheduledEndAt, 'HH:mm')}">
							2026/01/01 18:00 - 20:00
						</td>
						<td th:text="${request.reason ?: '-'}">病假</td>
						<td th:text="${request.reviewedByTeacher == null ? '-' : request.reviewedByTeacher.displayName}">教師</td>
						<td th:text="${request.reviewedAt == null ? '-' : #temporals.format(request.reviewedAt, 'yyyy/MM/dd HH:mm')}">
							2026/01/01 12:00
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
