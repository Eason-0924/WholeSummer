<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div>
			<div class="page-title-line mb-1">
				<h1 class="h3 mb-0">學生管理</h1>
				<span th:replace="~{fragments/layout :: help('管理在學中與已畢業學生資料\n∙ 新增學生：加入新進學生\n∙ 編輯：變更學生資料\n∙ 畢業：將學生設定為「已畢業」\n∙ 復學：將學生設定為「在學中」\n∙ 永久刪除請至設定中的資料表管理頁執行')}"></span>
			</div>
		</div>
		<div class="d-flex align-items-center gap-2">
			<a th:if="${teacherPermissions.studentCreate}" class="btn btn-primary"
					th:href="@{/students/new}">新增學生</a>
		</div>
	</div>

	<section class="mb-4">
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">在學中</h2>
			<span class="badge text-bg-success" th:text="${#lists.size(activeStudents)}">0</span>
		</div>
		<div class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>中文名</th>
					<th>英文名</th>
					<th>性別</th>
					<th>學校</th>
					<th>年級</th>
					<th class="mobile-secondary-column tablet-hidden-column">生日</th>
					<th>電話</th>
					<th class="text-end">操作</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(activeStudents)}">
					<td colspan="8" class="text-center text-secondary py-4">目前尚無在學中學生</td>
				</tr>
				<tr th:each="student : ${activeStudents}">
					<td>
						<a th:href="@{/students/{slug}(slug=${student.urlSlug})}" th:text="${student.chineseName}">中文名</a>
					</td>
					<td th:text="${student.englishName ?: '-'}">-</td>
					<td th:text="${student.gender ?: '-'}">-</td>
					<td th:text="${student.school ?: '-'}">-</td>
					<td th:text="${student.grade ?: '-'}">-</td>
					<td class="mobile-secondary-column tablet-hidden-column"
							th:text="${teacherPermissions.studentSensitiveView ? (student.birthday == null ? '-' : #temporals.format(student.birthday, 'yyyy/MM/dd')) : '無權限查看'}">-</td>
					<td th:text="${teacherPermissions.studentSensitiveView ? (student.phone ?: '-') : '無權限查看'}">-</td>
					<td class="text-end">
						<div th:if="${teacherPermissions.studentUpdate}" class="d-inline-flex gap-2">
							<a class="btn btn-sm btn-outline-primary"
									th:href="@{/students/{slug}/edit(slug=${student.urlSlug})}">編輯</a>
							<form th:action="@{/students/{slug}/deactivate(slug=${student.urlSlug})}"
									method="post" onsubmit="return confirm('確定要將這位學生設為已畢業嗎？');">
								<button class="btn btn-sm btn-outline-danger" type="submit">畢業</button>
							</form>
						</div>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>

	<section>
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">已畢業</h2>
			<span class="badge text-bg-danger" th:text="${#lists.size(inactiveStudents)}">0</span>
		</div>
		<div class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>中文名</th>
					<th>英文名</th>
					<th>性別</th>
					<th>學校</th>
					<th>年級</th>
					<th class="mobile-secondary-column tablet-hidden-column">生日</th>
					<th>電話</th>
					<th class="text-end">操作</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(inactiveStudents)}">
					<td colspan="8" class="text-center text-secondary py-4">目前尚無已畢業學生</td>
				</tr>
				<tr th:each="student : ${inactiveStudents}">
					<td>
						<a th:href="@{/students/{slug}(slug=${student.urlSlug})}" th:text="${student.chineseName}">中文名</a>
					</td>
					<td th:text="${student.englishName ?: '-'}">-</td>
					<td th:text="${student.gender ?: '-'}">-</td>
					<td th:text="${student.school ?: '-'}">-</td>
					<td th:text="${student.grade ?: '-'}">-</td>
					<td class="mobile-secondary-column tablet-hidden-column"
							th:text="${teacherPermissions.studentSensitiveView ? (student.birthday == null ? '-' : #temporals.format(student.birthday, 'yyyy/MM/dd')) : '無權限查看'}">-</td>
					<td th:text="${teacherPermissions.studentSensitiveView ? (student.phone ?: '-') : '無權限查看'}">-</td>
					<td class="text-end">
						<div th:if="${teacherPermissions.studentUpdate}" class="d-inline-flex gap-2">
							<a class="btn btn-sm btn-outline-primary"
									th:href="@{/students/{slug}/edit(slug=${student.urlSlug})}">編輯</a>
							<form th:action="@{/students/{slug}/activate(slug=${student.urlSlug})}"
									method="post">
								<button class="btn btn-sm btn-outline-success" type="submit">復學</button>
							</form>
						</div>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
