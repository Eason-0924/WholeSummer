<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container py-4">
	<div class="d-flex justify-content-between align-items-center mb-3">
		<div><h1 class="h3 mb-1">系統操作紀錄</h1><div class="text-secondary small">每頁最多顯示 100 筆，不載入整張紀錄表。</div></div>
		<a class="btn btn-outline-secondary" th:href="@{/admin/system}">返回系統狀態</a>
	</div>
	<div class="table-responsive bg-white border rounded">
		<table class="table table-hover align-middle mb-0">
			<thead class="table-light"><tr><th>時間</th><th>操作者</th><th>操作</th><th>方法</th><th>路徑</th><th>結果</th></tr></thead>
			<tbody>
			<tr th:if="${logPage.empty}"><td colspan="6" class="text-center text-secondary py-4">目前尚無操作紀錄</td></tr>
			<tr th:each="log : ${logPage.content}">
				<td th:text="${#temporals.format(log.createdAt, 'yyyy/MM/dd HH:mm:ss')}">-</td>
				<td th:text="${log.actorName}">-</td><td th:text="${log.action}">-</td>
				<td th:text="${log.method}">-</td><td><code th:text="${log.path}">-</code></td>
				<td><span th:class="${log.result == '成功' ? 'badge text-bg-success' : 'badge text-bg-danger'}" th:text="${log.result}">-</span></td>
			</tr>
			</tbody>
		</table>
	</div>
	<nav class="mt-3" th:if="${logPage.totalPages > 1}" aria-label="操作紀錄分頁">
		<ul class="pagination justify-content-center">
			<li class="page-item" th:classappend="${logPage.first ? ' disabled' : ''}"><a class="page-link" th:href="@{/admin/system/logs(page=${logPage.number - 1},size=${logPage.size})}">上一頁</a></li>
			<li class="page-item disabled"><span class="page-link" th:text="${logPage.number + 1 + ' / ' + logPage.totalPages}">1 / 1</span></li>
			<li class="page-item" th:classappend="${logPage.last ? ' disabled' : ''}"><a class="page-link" th:href="@{/admin/system/logs(page=${logPage.number + 1},size=${logPage.size})}">下一頁</a></li>
		</ul>
	</nav>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
