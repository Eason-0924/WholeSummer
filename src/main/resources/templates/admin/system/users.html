<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container py-4">
	<div class="d-flex justify-content-between align-items-center mb-3">
		<h1 class="h3 mb-0">上線使用者</h1>
		<a class="btn btn-outline-secondary" th:href="@{/admin/system}">返回系統狀態</a>
	</div>
	<div class="table-responsive bg-white border rounded">
		<table class="table table-hover align-middle mb-0">
			<thead class="table-light"><tr><th>使用者</th><th>角色</th><th>登入時間</th><th>最後活動</th><th>狀態</th><th>裝置/IP</th><th>Session</th></tr></thead>
			<tbody>
			<tr th:if="${#lists.isEmpty(onlineUsers)}"><td colspan="7" class="text-center text-secondary py-4">目前沒有登入中的使用者</td></tr>
			<tr th:each="user : ${onlineUsers}">
				<td th:text="${user.displayName}">教師</td>
				<td th:text="${user.roleName}">教師</td>
				<td th:text="${#temporals.format(user.loginAt, 'yyyy/MM/dd HH:mm:ss')}">-</td>
				<td th:text="${#temporals.format(user.lastActiveAt, 'yyyy/MM/dd HH:mm:ss')}">-</td>
				<td><span class="badge text-bg-success" th:text="${user.state}">在線</span></td>
				<td><div th:text="${user.ipAddress}">-</div><div class="small text-secondary" th:text="${user.device}">-</div></td>
				<td><code th:text="${user.sessionIdMasked}">已遮蔽</code></td>
			</tr>
			</tbody>
		</table>
	</div>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
