<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div>
			<div class="page-title-line mb-1">
				<h1 class="h3 mb-0" th:text="${pageTitle}">卡片綁定</h1>
				<span th:replace="~{fragments/layout :: help('查看學生或教師目前的卡片綁定狀態。')}"></span>
			</div>
		</div>
		<div class="d-flex align-items-center gap-2">
			<a class="btn btn-outline-secondary" th:href="@{/attendance/card-check-in}">返回刷卡點名</a>
		</div>
	</div>

	<div class="row g-3">
		<section class="col-lg-7">
			<div class="bg-white border rounded p-4">
				<div class="mb-3">
					<label for="targetId" class="form-label">學生/教師</label>
					<select id="targetId" class="form-select">
						<option value="">請選擇</option>
						<optgroup label="學生">
							<option th:each="student : ${students}" th:value="${'STUDENT:' + student.id}"
									th:selected="${cardBindForm.targetKey == 'STUDENT:' + student.id}"
									th:attr="data-kind='學生',
											data-display-name=${student.displayName},
											data-card-id=${student.cardId ?: ''},
											data-card-status=${student.cardStatus ?: ''},
											data-card-bound-at=${student.cardBoundAt == null ? '' : #temporals.format(student.cardBoundAt, 'yyyy/MM/dd HH:mm')}"
									th:text="${student.displayName + (student.grade == null ? '' : ' - ' + student.grade)}">學生</option>
						</optgroup>
						<optgroup label="教師">
							<option th:each="teacher : ${teachers}" th:value="${'TEACHER:' + teacher.id}"
									th:selected="${cardBindForm.targetKey == 'TEACHER:' + teacher.id}"
									th:attr="data-kind='教師',
											data-display-name=${teacher.displayName},
											data-card-id=${teacher.cardId ?: ''},
											data-card-status=${teacher.cardStatus ?: ''},
											data-card-bound-at=${teacher.cardBoundAt == null ? '' : #temporals.format(teacher.cardBoundAt, 'yyyy/MM/dd HH:mm')}"
									th:text="${teacher.displayName}">教師</option>
						</optgroup>
					</select>
				</div>
				<div class="border rounded p-3 bg-light text-secondary">
					選擇對象後啟動綁定模式，下一次讀卡機刷到的卡片會綁定到該對象。
				</div>
				<div id="bindingModeStatus" class="alert alert-secondary mt-3 mb-0" role="status">
					目前沒有待綁定卡片
				</div>
				<div class="d-flex justify-content-end gap-2 mt-3">
					<button id="cancelBindingButton" class="btn btn-outline-secondary" type="button">取消綁定</button>
					<button id="startBindingButton" class="btn btn-primary" type="button">開始綁定下一張卡</button>
				</div>
			</div>
		</section>

		<section class="col-lg-5">
			<div class="bg-white border rounded p-4 h-100">
				<h2 class="h5 mb-3">目前綁定狀態</h2>
				<div class="row g-0 align-items-stretch">
					<div class="col-md-5 pe-md-4 mb-3 mb-md-0">
						<div class="mb-3">
							<div class="text-secondary small">類型</div>
							<div id="bindStatusKind">-</div>
						</div>
						<div>
							<div class="text-secondary small">姓名</div>
							<div id="bindStatusName" class="fw-semibold">請選擇學生或教師</div>
						</div>
					</div>
					<div class="col-md-7 ps-md-4 border-top pt-3 border-md-top-0 border-md-start pt-md-0">
						<div class="mb-3">
							<div class="text-secondary small">卡號</div>
							<div id="bindStatusCardId" class="font-monospace">-</div>
						</div>
						<div class="mb-3">
							<div class="text-secondary small">狀態</div>
							<span id="bindStatusBadge" class="badge text-bg-secondary">-</span>
						</div>
						<div>
							<div class="text-secondary small">綁定時間</div>
							<div id="bindStatusBoundAt">-</div>
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
<style>
	@media (min-width: 768px) {
		.border-md-top-0 {
			border-top: 0 !important;
		}

		.border-md-start {
			border-left: 1px solid var(--bs-border-color) !important;
		}
	}
</style>
<script>
	(() => {
		const targetId = document.getElementById('targetId');
		const statusKind = document.getElementById('bindStatusKind');
		const statusName = document.getElementById('bindStatusName');
		const statusCardId = document.getElementById('bindStatusCardId');
		const statusBadge = document.getElementById('bindStatusBadge');
		const statusBoundAt = document.getElementById('bindStatusBoundAt');
		const bindingModeStatus = document.getElementById('bindingModeStatus');
		const startBindingButton = document.getElementById('startBindingButton');
		const cancelBindingButton = document.getElementById('cancelBindingButton');

		const bindingEndpoints = {
			start: '/attendance/card-bind/start',
			cancel: '/attendance/card-bind/cancel',
			pending: '/attendance/card-bind/pending'
		};

		const updateBindStatus = () => {
			const selected = targetId?.selectedOptions[0];
			if (!selected || !selected.value) {
				statusKind.textContent = '-';
				statusName.textContent = '請選擇學生或教師';
				statusCardId.textContent = '-';
				statusBadge.textContent = '-';
				statusBadge.className = 'badge text-bg-secondary';
				statusBoundAt.textContent = '-';
				return;
			}
			const cardStatus = selected.dataset.cardStatus || '-';
			statusKind.textContent = selected.dataset.kind || '-';
			statusName.textContent = selected.dataset.displayName || selected.textContent.trim();
			statusCardId.textContent = selected.dataset.cardId || '尚未綁定';
			statusBadge.textContent = cardStatus;
			statusBadge.className = cardStatus === 'ACTIVE' ? 'badge text-bg-success' : 'badge text-bg-secondary';
			statusBoundAt.textContent = selected.dataset.cardBoundAt || '-';
		};

		const setBindingStatus = (response) => {
			bindingModeStatus.classList.remove('alert-secondary', 'alert-success', 'alert-danger', 'alert-warning');
			if (!response.success) {
				bindingModeStatus.classList.add('alert-danger');
				bindingModeStatus.textContent = response.message || '綁定模式啟動失敗';
				return;
			}
			if (response.active) {
				bindingModeStatus.classList.add('alert-warning');
				bindingModeStatus.textContent = `${response.displayName} 等待刷卡綁定中`;
				return;
			}
			bindingModeStatus.classList.add('alert-secondary');
			bindingModeStatus.textContent = response.message || '目前沒有待綁定卡片';
		};

		const postJson = async (url, payload = {}) => {
			const response = await fetch(url, {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify(payload)
			});
			const body = await response.json();
			if (!response.ok) {
				return { success: false, message: body.message || '操作失敗' };
			}
			return body;
		};

		const startBinding = async () => {
			const selected = targetId?.selectedOptions[0];
			if (!selected || !selected.value) {
				setBindingStatus({ success: false, message: '請先選擇學生或教師' });
				return;
			}
			const existingCardId = selected.dataset.cardId?.trim();
			let overwriteExisting = false;
			if (existingCardId) {
				overwriteExisting = window.confirm('此對象目前已綁定卡號，是否覆蓋原卡號？');
				if (!overwriteExisting) {
					return;
				}
			}
			startBindingButton.disabled = true;
			const response = await postJson(bindingEndpoints.start, {
				targetKey: selected.value,
				overwriteExisting
			});
			setBindingStatus(response);
			startBindingButton.disabled = false;
		};

		const cancelBinding = async () => {
			cancelBindingButton.disabled = true;
			await postJson(bindingEndpoints.cancel);
			setBindingStatus({ success: true, active: false, message: '目前沒有待綁定卡片' });
			cancelBindingButton.disabled = false;
		};

		const loadPending = async () => {
			try {
				const response = await fetch(bindingEndpoints.pending, {
					headers: { 'Accept': 'application/json' }
				});
				if (response.ok) {
					setBindingStatus(await response.json());
				}
			} catch (error) {
				// Binding mode status is helpful, but the page can still show card status without it.
			}
		};

		targetId?.addEventListener('change', updateBindStatus);
		startBindingButton?.addEventListener('click', startBinding);
		cancelBindingButton?.addEventListener('click', cancelBinding);
		updateBindStatus();
		loadPending();
		window.setInterval(loadPending, 5000);
	})();
</script>
</body>
</html>
