<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div>
			<div class="page-title-line mb-1">
				<h1 class="h3 mb-0" th:text="${pageTitle}">刷卡點名</h1>
			</div>
		</div>
		<div class="d-flex align-items-center gap-2">
			<button id="refreshRecentButton" class="btn btn-outline-secondary" type="button">重新整理</button>
			<a class="btn btn-outline-primary" th:href="@{/attendance/card-bind}">卡片綁定</a>
		</div>
	</div>

	<section class="bg-white border rounded p-4 mb-3">
		<div class="d-flex flex-column flex-md-row justify-content-between gap-2">
			<div>
				<h2 class="h5 mb-1">刷卡點名紀錄</h2>
				<div id="recentSummary" class="text-secondary small">讀取中</div>
			</div>
			<div id="lastUpdatedAt" class="text-secondary small align-self-md-end">-</div>
		</div>
	</section>

	<section>
		<div class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th style="width: 9rem;">時間</th>
					<th style="width: 6rem;">類型</th>
					<th>姓名</th>
					<th style="width: 7rem;">動作</th>
					<th>班級</th>
					<th>訊息</th>
					<th>卡號</th>
					<th>設備</th>
				</tr>
				</thead>
				<tbody id="recentCheckIns" th:attr="data-recent-url=@{/api/attendance/card-check-ins/recent(limit=30)}">
				<tr>
					<td colspan="8" class="text-center text-secondary py-4">尚無刷卡紀錄</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
<script>
	(() => {
		const recentBody = document.getElementById('recentCheckIns');
		const refreshButton = document.getElementById('refreshRecentButton');
		const recentSummary = document.getElementById('recentSummary');
		const lastUpdatedAt = document.getElementById('lastUpdatedAt');

		const formatDateTime = (value) => {
			if (!value) {
				return '-';
			}
			const date = new Date(value);
			if (Number.isNaN(date.getTime())) {
				return value.replace('T', ' ');
			}
			return date.toLocaleString('zh-TW', {
				month: '2-digit',
				day: '2-digit',
				hour: '2-digit',
				minute: '2-digit',
				second: '2-digit'
			});
		};

		const appendCell = (row, value, className = '') => {
			const cell = document.createElement('td');
			cell.className = className;
			cell.textContent = value || '-';
			row.append(cell);
		};

		const renderEmpty = (message) => {
			recentBody.replaceChildren();
			const row = document.createElement('tr');
			const cell = document.createElement('td');
			cell.colSpan = 8;
			cell.className = 'text-center text-secondary py-4';
			cell.textContent = message;
			row.append(cell);
			recentBody.append(row);
		};

		const renderRecords = (records) => {
			recentBody.replaceChildren();
			if (!records.length) {
				renderEmpty('尚無刷卡紀錄');
				recentSummary.textContent = '目前沒有刷卡紀錄';
				return;
			}
			records.forEach((record) => {
				const row = document.createElement('tr');
				appendCell(row, formatDateTime(record.occurredAt));
				appendCell(row, record.personTypeLabel);
				appendCell(row, record.displayName, 'fw-semibold');
				appendCell(row, record.actionLabel, record.success ? 'text-success fw-semibold' : 'text-danger fw-semibold');
				appendCell(row, record.className);
				appendCell(row, record.message);
				appendCell(row, record.cardId, 'font-monospace');
				appendCell(row, record.deviceName);
				recentBody.append(row);
			});
			recentSummary.textContent = `顯示最近 ${records.length} 筆紀錄`;
		};

		const loadRecords = async () => {
			if (!recentBody?.dataset.recentUrl) {
				return;
			}
			refreshButton.disabled = true;
			try {
				const response = await fetch(recentBody.dataset.recentUrl, {
					headers: { 'Accept': 'application/json' }
				});
				if (!response.ok) {
					throw new Error('request failed');
				}
				const records = await response.json();
				renderRecords(Array.isArray(records) ? records : []);
				lastUpdatedAt.textContent = `更新時間 ${new Date().toLocaleTimeString('zh-TW', {
					hour: '2-digit',
					minute: '2-digit',
					second: '2-digit'
				})}`;
			} catch (error) {
				renderEmpty('讀取刷卡紀錄失敗');
				recentSummary.textContent = '刷卡紀錄讀取失敗';
			} finally {
				refreshButton.disabled = false;
			}
		};

		refreshButton?.addEventListener('click', loadRecords);
		loadRecords();
		window.setInterval(loadRecords, 5000);
	})();
</script>
</body>
</html>
