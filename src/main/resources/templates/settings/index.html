<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div>
			<div class="page-title-line mb-1">
				<h1 class="h3 mb-0">系統設定</h1>
				<span th:replace="~{fragments/layout :: help('在此調整系統名稱、畫面模式、提醒天數與目前登入教師的個人密碼。\n∙ 畫面模式儲存在目前瀏覽器\n∙ 其他系統設定儲存在資料庫')}"></span>
			</div>
		</div>
		<a class="btn btn-outline-secondary" th:href="@{/}">返回首頁</a>
	</div>

	<div th:if="${message}" class="alert alert-success" th:text="${message}">已更新</div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">發生錯誤</div>

	<section class="bg-white border rounded p-4 mb-4">
		<h2 class="h5 mb-3">畫面模式</h2>
		<div class="btn-group" role="group" aria-label="畫面模式">
			<input type="radio" class="btn-check" id="themeLight"
					value="light" data-theme-option autocomplete="off">
			<label class="btn btn-outline-secondary" for="themeLight">亮色</label>

			<input type="radio" class="btn-check" id="themeDark"
					value="dark" data-theme-option autocomplete="off">
			<label class="btn btn-outline-secondary" for="themeDark">暗色</label>

			<input type="radio" class="btn-check" id="themeSystem"
					value="system" data-theme-option autocomplete="off">
			<label class="btn btn-outline-secondary" for="themeSystem">跟隨裝置</label>
		</div>
	</section>

	<section class="bg-white border rounded p-4 mb-4">
		<h2 class="h5 mb-3">一般設定</h2>
		<form th:action="@{/settings/general}" method="post" class="row g-3">
			<div class="col-md-6">
				<label for="systemName" class="form-label">系統名稱</label>
				<input id="systemName" class="form-control" type="text" name="systemName"
						th:value="${systemNameValue}" required>
			</div>
			<div class="col-md-6">
				<label for="homeworkWarningDays" class="form-label">即將到期作業提醒天數</label>
				<input id="homeworkWarningDays" class="form-control" type="number" min="0" step="1"
						name="homeworkWarningDays" data-overdue-reminder-days
						th:data-current-value="${homeworkWarningDaysValue}"
						th:value="${homeworkWarningDaysValue}">
			</div>
			<div class="col-md-6">
				<label for="backupReminderDays" class="form-label">備份提醒天數</label>
				<input id="backupReminderDays" class="form-control" type="number" min="0" step="1"
						name="backupReminderDays" th:value="${backupReminderDaysValue}">
			</div>
			<div class="col-12">
				<button class="btn btn-primary" type="submit">儲存設定</button>
			</div>
		</form>
	</section>

	<section class="bg-white border rounded p-4 mb-4">
		<h2 class="h5 mb-1">個人登入密碼</h2>
		<div class="text-secondary small mb-3" th:text="${'目前登入：' + currentTeacherName}">目前登入：教師</div>
		<form th:action="@{/settings/password}" method="post" class="row g-3">
			<div class="col-md-4">
				<label for="currentPassword" class="form-label">目前密碼</label>
				<input id="currentPassword" class="form-control" type="password" name="currentPassword"
						autocomplete="current-password" required>
			</div>
			<div class="col-md-4">
				<label for="newPassword" class="form-label">新密碼</label>
				<input id="newPassword" class="form-control" type="password" name="newPassword"
						autocomplete="new-password" required>
			</div>
			<div class="col-md-4">
				<label for="confirmPassword" class="form-label">確認新密碼</label>
				<input id="confirmPassword" class="form-control" type="password" name="confirmPassword"
						autocomplete="new-password" required>
			</div>
			<div class="col-12 d-flex align-items-center gap-3">
				<button class="btn btn-primary" type="submit">更新密碼</button>
				<span class="text-secondary small">只會變更目前教師帳號的密碼。</span>
			</div>
		</form>
	</section>

	<section th:if="${currentTeacherIsDirector}" class="bg-white border rounded p-4 mb-4">
		<h2 class="h5 mb-1">教師註冊安全碼</h2>
		<div class="text-secondary small mb-3">只有主任可以變更。新教師註冊時必須輸入此安全碼。</div>
		<form th:action="@{/settings/registration-code}" method="post" class="row g-3">
			<div class="col-md-4">
				<label for="currentRegistrationCode" class="form-label">目前安全碼</label>
				<input id="currentRegistrationCode" class="form-control" type="password"
						name="currentRegistrationCode" autocomplete="off" required>
			</div>
			<div class="col-md-4">
				<label for="newRegistrationCode" class="form-label">新安全碼</label>
				<input id="newRegistrationCode" class="form-control" type="password"
						name="newRegistrationCode" minlength="8" maxlength="100" autocomplete="off" required>
			</div>
			<div class="col-md-4">
				<label for="confirmRegistrationCode" class="form-label">確認新安全碼</label>
				<input id="confirmRegistrationCode" class="form-control" type="password"
						name="confirmRegistrationCode" minlength="8" maxlength="100" autocomplete="off" required>
			</div>
			<div class="col-12">
				<button class="btn btn-primary" type="submit">更新註冊安全碼</button>
			</div>
		</form>
	</section>

	<section th:if="${currentTeacherIsDirector}" id="system-update"
			class="bg-white border rounded p-4 mb-4">
		<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
			<div>
				<h2 class="h5 mb-1">系統更新</h2>
				<div class="text-secondary small" th:text="${'目前版本：' + appVersion}">
					目前版本：1.0.1
				</div>
			</div>
			<form th:action="@{/updates/check}" method="post">
				<button class="btn btn-outline-primary" type="submit"
						th:disabled="${!updateEnabled or updateChecking}">
					<span th:text="${updateChecking ? '檢查中…' : '檢查更新'}">檢查更新</span>
				</button>
			</form>
		</div>

		<div th:if="${!updateEnabled}" class="alert alert-secondary mb-0">
			目前執行環境未啟用 Windows 自動更新。
		</div>
		<div th:if="${updateError != null}" class="alert alert-warning"
				th:text="${updateError}">無法檢查更新</div>
		<div th:if="${availableUpdate == null and updateEnabled and updateError == null}"
				class="text-secondary">目前沒有待安裝的更新。</div>

		<div th:if="${availableUpdate != null}">
			<div class="border rounded p-3 mb-3">
				<div class="fw-semibold mb-1"
						th:text="${'可更新至 WholeSummer ' + availableUpdate.latestVersion}">
					可更新至新版本
				</div>
				<div class="small text-secondary mb-2"
						th:text="${availableUpdate.assetName}">安裝檔</div>
				<div th:if="${!#strings.isEmpty(availableUpdate.releaseNotes)}"
						class="small" style="white-space: pre-wrap;"
						th:text="${availableUpdate.releaseNotes}">更新內容</div>
			</div>
			<div class="d-flex gap-2">
				<form th:action="@{/updates/ignore}" method="post">
					<button class="btn btn-outline-secondary" type="submit">稍後再說</button>
				</form>
				<form th:action="@{/updates/install}" method="post"
						onsubmit="return confirm('更新會下載安裝檔並關閉目前系統，確定要繼續嗎？');">
					<button class="btn btn-primary" type="submit">立即更新</button>
				</form>
			</div>
		</div>
	</section>

	<div th:replace="~{backup/index :: content}"></div>

	<div class="text-center text-secondary small py-3"
			th:text="${'WholeSummer ' + appVersion}">WholeSummer 1.0.1</div>

</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
