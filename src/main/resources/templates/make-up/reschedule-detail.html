<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<style>
		.make-up-calendar {
			display: grid;
			gap: 0.5rem;
			grid-template-columns: repeat(7, minmax(0, 1fr));
		}
		.make-up-day {
			min-height: 5rem;
		}
		.make-up-day-number {
			font-size: 1.15rem;
			font-weight: 700;
			line-height: 1.2;
		}
		.make-up-day-counts {
			align-items: center;
			display: flex;
			gap: 0.3rem;
		}
		.make-up-day-count {
			font-size: 0.85rem;
			font-weight: 700;
			line-height: 1;
			min-width: auto;
			padding: 0.18rem 0.32rem;
		}
		.make-up-weekday {
			font-size: 0.8rem;
			font-weight: 600;
		}
		.make-up-legend {
			font-size: 1rem;
		}
		.make-up-slot-selectable {
			cursor: pointer;
		}
		.make-up-slot-selected {
			box-shadow: inset 0 0 0 2px var(--bs-primary);
		}
	</style>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div class="page-title-line mb-1">
			<h1 class="h3 mb-0">重新設定調課時間</h1>
			<span th:replace="~{fragments/layout :: help('以月曆檢視這堂課近一月可調課時段。點選日期可查看當日所有候選時段。')}"></span>
		</div>
		<a class="btn btn-outline-secondary" th:href="@{/make-up}">返回補課/調課</a>
	</div>

	<section class="card">
		<div class="card-body">
			<div class="d-flex flex-wrap align-items-center gap-2 mb-2">
				<span class="badge text-bg-success">調課</span>
				<span class="badge text-bg-light border"
						th:text="${#strings.isEmpty(view.schedule.rescheduleReason) ? '調課' : view.schedule.rescheduleReason}">
					調課
				</span>
				<span class="badge text-bg-secondary">已完成</span>
			</div>
			<h2 class="h4 mb-2" th:text="${view.className}">班級</h2>
			<div class="text-secondary small mb-3">
				<span th:text="${view.originalCourseText}">原課程</span>
				<span class="mx-2">｜</span>
				<span>目前調課：</span>
				<span th:text="${#temporals.format(view.schedule.scheduledStartAt, 'yyyy/MM/dd HH:mm')}">2026/07/01 18:00</span>
				<span> ~ </span>
				<span th:text="${#temporals.format(view.schedule.scheduledEndAt, 'HH:mm')}">20:00</span>
				<span class="mx-2">｜</span>
				<span>教師：</span>
				<span th:text="${view.teacherName}">教師</span>
			</div>

			<div class="d-flex flex-wrap gap-2 make-up-legend mb-3">
				<span class="badge text-bg-success">綠色：學生與教師皆無課程</span>
				<span class="badge text-bg-warning">黃色：學生無課，教師有課</span>
				<span class="badge text-bg-danger">紅色：學生已有其他課程</span>
			</div>

			<div class="make-up-calendar mb-2 text-center text-secondary make-up-weekday">
				<div>週日</div>
				<div>週一</div>
				<div>週二</div>
				<div>週三</div>
				<div>週四</div>
				<div>週五</div>
				<div>週六</div>
			</div>
			<div class="make-up-calendar"
					th:attr="data-calendar-url=@{/make-up/reschedules/{id}/calendar(id=${view.schedule.id})}">
				<div th:if="${!#lists.isEmpty(view.calendarDates) and view.calendarDates[0].date.dayOfWeek.value % 7 > 0}"
						th:each="blank : ${#numbers.sequence(1, view.calendarDates[0].date.dayOfWeek.value % 7)}"></div>
				<button type="button"
						class="btn btn-outline-secondary make-up-day text-start"
						th:each="day : ${view.calendarDates}"
						data-bs-toggle="modal"
						data-bs-target="#makeUpSlotsModal"
						th:classappend="${day.calculated ? ' border-' + day.statusClass : ''}"
						th:attr="data-slots-url=@{/make-up/reschedules/{id}/slots(id=${view.schedule.id},date=${#temporals.format(day.date, 'yyyy-MM-dd')})},data-date-text=${#temporals.format(day.date, 'yyyy/MM/dd')},data-calendar-date=${#temporals.format(day.date, 'yyyy-MM-dd')}">
					<div class="make-up-day-number" th:text="${#temporals.format(day.date, 'MM/dd')}">07/01</div>
					<div class="make-up-day-counts mt-2" th:classappend="${day.calculated ? '' : ' opacity-50'}">
						<span class="badge text-bg-success make-up-day-count make-up-day-count-success"
								th:text="${day.availableCount}">0</span>
						<span class="badge text-bg-warning make-up-day-count make-up-day-count-warning"
								th:text="${day.teacherConflictCount}">0</span>
						<span class="badge text-bg-danger make-up-day-count make-up-day-count-danger"
								th:text="${day.studentConflictCount}">0</span>
					</div>
				</button>
			</div>

			<div class="modal fade" id="makeUpSlotsModal" tabindex="-1" aria-hidden="true">
				<div class="modal-dialog modal-dialog-scrollable">
					<div class="modal-content">
						<div class="modal-header">
							<h3 class="modal-title h5">
								<span id="makeUpSlotsModalDate">2026/07/01</span>
								<span>可調課時段</span>
							</h3>
							<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
						</div>
						<div class="modal-body">
							<div id="makeUpSlotsLoading" class="text-secondary">載入中...</div>
							<div id="makeUpSlotsError" class="alert alert-danger d-none">載入調課時段失敗，請稍後再試。</div>
							<div id="makeUpSlotsList" class="list-group d-none"></div>
							<form id="makeUpScheduleForm" class="d-none" method="post"
									th:action="@{/make-up/reschedules/{id}/update(id=${view.schedule.id})}">
								<input type="hidden" name="newStart" id="makeUpScheduleStart">
								<input type="hidden" name="reason"
										th:value="${#strings.isEmpty(view.schedule.rescheduleReason) ? '調課' : view.schedule.rescheduleReason}">
								<input type="hidden" name="allowTeacherConflict" id="makeUpAllowTeacherConflict" value="false">
							</form>
						</div>
						<div class="modal-footer">
							<button type="button" class="btn btn-primary" id="makeUpScheduleSubmit" disabled>重新設定</button>
							<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
<script>
	const slotsModal = document.getElementById('makeUpSlotsModal');
	const slotsModalDate = document.getElementById('makeUpSlotsModalDate');
	const slotsLoading = document.getElementById('makeUpSlotsLoading');
	const slotsError = document.getElementById('makeUpSlotsError');
	const slotsList = document.getElementById('makeUpSlotsList');
	const scheduleForm = document.getElementById('makeUpScheduleForm');
	const scheduleStart = document.getElementById('makeUpScheduleStart');
	const allowTeacherConflict = document.getElementById('makeUpAllowTeacherConflict');
	const scheduleSubmit = document.getElementById('makeUpScheduleSubmit');
	const loadedSlots = new Map();
	const slotRequestTimeoutMs = 12000;
	const calendar = document.querySelector('[data-calendar-url]');
	let selectedMakeUpSlot = null;
	let calendarPollCount = 0;
	const maximumCalendarPollCount = 10;

	if (slotsModal) {
		slotsModal.addEventListener('show.bs.modal', async (event) => {
			const button = event.relatedTarget;
			const url = button ? button.dataset.slotsUrl : null;
			const dateText = button ? button.dataset.dateText : '';
			slotsModalDate.textContent = dateText;
			slotsLoading.classList.remove('d-none');
			slotsError.classList.add('d-none');
			slotsList.classList.add('d-none');
			slotsList.innerHTML = '';
			clearSelectedMakeUpSlot();

			try {
				if (!url) {
					throw new Error('missing slots url');
				}
				const slots = loadedSlots.has(url)
						? loadedSlots.get(url)
						: await fetchSlots(url);
				loadedSlots.set(url, slots);
				slots.forEach((slot) => {
					const item = document.createElement('div');
					item.className = `list-group-item d-flex justify-content-between align-items-center gap-2 list-group-item-${slot.statusClass}`;
					if (slot.statusClass === 'success' || slot.statusClass === 'warning') {
						item.classList.add('make-up-slot-selectable');
						item.setAttribute('role', 'button');
						item.tabIndex = 0;
						item.addEventListener('click', () => selectMakeUpSlot(slot, item));
						item.addEventListener('keydown', (event) => {
							if (event.key === 'Enter' || event.key === ' ') {
								event.preventDefault();
								selectMakeUpSlot(slot, item);
							}
						});
					}
					const time = document.createElement('span');
					time.textContent = slot.timeText;
					const badge = document.createElement('span');
					badge.className = `badge text-bg-${slot.statusClass}`;
					badge.textContent = slot.statusLabel;
					const actions = document.createElement('div');
					actions.className = 'd-flex align-items-center gap-2';
					actions.appendChild(badge);
					item.append(time, actions);
					slotsList.appendChild(item);
				});
				slotsLoading.classList.add('d-none');
				slotsList.classList.remove('d-none');
			} catch (error) {
				slotsLoading.classList.add('d-none');
				slotsError.classList.remove('d-none');
			}
		});
	}

	if (scheduleSubmit) {
		scheduleSubmit.addEventListener('click', () => submitMakeUpSchedule(selectedMakeUpSlot));
	}

	if (calendar) {
		refreshCalendarStatuses();
	}

	async function refreshCalendarStatuses() {
		try {
			const days = await fetch(calendar.dataset.calendarUrl, {
				headers: { 'Accept': 'application/json' }
			}).then((response) => {
				if (!response.ok) {
					throw new Error('failed');
				}
				return response.json();
			});
			let allCalculated = true;
			days.forEach((day) => {
				const button = calendar.querySelector(`[data-calendar-date="${day.date}"]`);
				if (!button) {
					return;
				}
				allCalculated = allCalculated && day.calculated;
				updateCalendarDay(button, day);
			});
			if (!allCalculated && calendarPollCount < maximumCalendarPollCount) {
				calendarPollCount += 1;
				window.setTimeout(refreshCalendarStatuses, 1500);
			}
		} catch (error) {
			if (calendarPollCount < maximumCalendarPollCount) {
				calendarPollCount += 1;
				window.setTimeout(refreshCalendarStatuses, 2500);
			}
		}
	}

	function updateCalendarDay(button, day) {
		const counts = button.querySelector('.make-up-day-counts');
		const availableCount = button.querySelector('.make-up-day-count-success');
		const teacherConflictCount = button.querySelector('.make-up-day-count-warning');
		const studentConflictCount = button.querySelector('.make-up-day-count-danger');
		button.classList.remove('border-success', 'border-warning', 'border-danger', 'border-secondary');
		button.classList.add(`border-${day.statusClass}`);
		counts?.classList.toggle('opacity-50', !day.calculated);
		if (availableCount) {
			availableCount.textContent = day.availableCount;
		}
		if (teacherConflictCount) {
			teacherConflictCount.textContent = day.teacherConflictCount;
		}
		if (studentConflictCount) {
			studentConflictCount.textContent = day.studentConflictCount;
		}
	}

	function submitMakeUpSchedule(slot) {
		if (!scheduleForm || !scheduleStart || !allowTeacherConflict || !slot) {
			return;
		}
		if (slot.statusClass === 'warning') {
			const details = (slot.teacherConflictDetails || []).length > 0
					? slot.teacherConflictDetails.map((detail) => `・${detail}`).join('\n')
					: '・此時段教師已有其他課程';
			const confirmed = window.confirm(`此時段教師已有以下課程：\n${details}\n\n是否仍要安排調課？`);
			if (!confirmed) {
				return;
			}
		}
		scheduleStart.value = slot.start;
		allowTeacherConflict.value = slot.statusClass === 'warning' ? 'true' : 'false';
		scheduleForm.submit();
	}

	function selectMakeUpSlot(slot, item) {
		selectedMakeUpSlot = slot;
		slotsList.querySelectorAll('.make-up-slot-selected')
			.forEach((selectedItem) => selectedItem.classList.remove('make-up-slot-selected'));
		item.classList.add('make-up-slot-selected');
		if (scheduleSubmit) {
			scheduleSubmit.disabled = false;
			scheduleSubmit.className = `btn btn-${slot.statusClass === 'warning' ? 'warning' : 'primary'}`;
		}
	}

	function clearSelectedMakeUpSlot() {
		selectedMakeUpSlot = null;
		if (scheduleSubmit) {
			scheduleSubmit.disabled = true;
			scheduleSubmit.className = 'btn btn-primary';
		}
	}

	async function fetchSlots(url) {
		const controller = new AbortController();
		const timeoutId = window.setTimeout(() => controller.abort(), slotRequestTimeoutMs);
		try {
			return await fetch(url, {
				headers: { 'Accept': 'application/json' },
				signal: controller.signal
			}).then((response) => {
				if (!response.ok) {
					throw new Error('failed');
				}
				return response.json();
			});
		} finally {
			window.clearTimeout(timeoutId);
		}
	}
</script>
</body>
</html>
