<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${pageTitle}">學生請假</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			min-height: 100vh;
		}
		.liff-shell {
			max-width: 560px;
		}
		.lesson-option {
			white-space: normal;
		}
		.status-panel {
			min-height: 48px;
		}
	</style>
</head>
<body class="bg-light" th:attr="data-liff-id=${liffId}">
	<main class="container liff-shell py-4">
		<section class="bg-white border rounded p-4 shadow-sm">
			<div class="d-flex align-items-start justify-content-between gap-3 mb-3">
				<div>
					<h1 class="h4 mb-1">學生請假</h1>
					<div class="small text-secondary" id="accountStatus">正在確認 LINE 身分</div>
				</div>
				<span class="badge text-bg-light border">LINE</span>
			</div>

			<div id="loadingBox" class="alert alert-info status-panel mb-3">
				載入中，請稍候。
			</div>

			<div id="notBoundBox" class="alert alert-warning status-panel d-none mb-3">
				尚未綁定學生。請向補習班索取 LINE 綁定碼，並在官方帳號聊天室輸入「綁定 123456」。
			</div>

			<form id="leaveForm" class="d-none" novalidate>
				<div class="mb-3">
					<label class="form-label" for="studentSelect">學生</label>
					<select id="studentSelect" class="form-select" required></select>
				</div>

				<div class="mb-3">
					<label class="form-label" for="courseSelect">課程</label>
					<select id="courseSelect" class="form-select" required></select>
				</div>

				<div class="mb-3">
					<label class="form-label" for="lessonSelect">上課時段</label>
					<select id="lessonSelect" class="form-select lesson-option" required></select>
					<div id="lessonHint" class="form-text"></div>
				</div>

				<div class="mb-3">
					<label class="form-label" for="reasonType">請假原因</label>
					<select id="reasonType" class="form-select" required>
						<option value="SICK">病假</option>
						<option value="PERSONAL">事假</option>
						<option value="SCHOOL">學校活動</option>
						<option value="OTHER">其他</option>
					</select>
				</div>

				<div class="mb-3">
					<label class="form-label" for="note">備註</label>
					<textarea id="note" class="form-control" rows="4" maxlength="450"
							placeholder="可補充學生狀況或聯絡事項"></textarea>
				</div>

				<button id="submitButton" type="submit" class="btn btn-primary w-100">
					送出請假申請
				</button>
			</form>

			<div id="successBox" class="alert alert-success status-panel d-none mt-3"></div>
			<div id="errorBox" class="alert alert-danger status-panel d-none mt-3"></div>
		</section>
	</main>
	<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
	<script src="/js/liff-leave.js"></script>
</body>
</html>
