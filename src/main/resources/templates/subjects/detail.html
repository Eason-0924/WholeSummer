<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div>
			<div class="page-title-line mb-1">
				<h1 class="h3 mb-0" th:text="${subject.name}">科目名稱</h1>
				<span th:replace="~{fragments/layout :: help('查看科目詳細資料與目前開課班級。')}"></span>
			</div>
		</div>
		<div class="d-flex align-items-center gap-2">
			<a class="btn btn-outline-secondary" th:href="@{/subjects}">返回</a>
			<a class="btn btn-outline-primary" th:href="@{/subjects/{slug}/edit(slug=${subject.urlSlug})}">編輯</a>
		</div>
	</div>

	<section class="bg-white border rounded p-4">
		<div class="row g-3">
			<div class="col-md-6">
				<div class="text-secondary small">狀態</div>
				<div>
					<span th:if="${subject.active}" class="badge text-bg-success">使用中</span>
					<span th:unless="${subject.active}" class="badge text-bg-danger">已停用</span>
				</div>
			</div>
			<div class="col-md-6">
				<div class="text-secondary small">適用年級</div>
				<div th:text="${subject.gradeLevelDisplay}">國一、國二</div>
			</div>
			<div class="col-md-6">
				<div class="text-secondary small">教師</div>
				<div th:text="${subject.teacherDisplay}">-</div>
			</div>
			<div class="col-md-6">
				<div class="text-secondary small">開課班級數</div>
				<div th:text="${#lists.size(activeClasses)}">0</div>
			</div>
			<div class="col-12">
				<div class="text-secondary small">說明</div>
				<div class="border rounded p-3 bg-light" th:text="${subject.description ?: '-'}">-</div>
			</div>
		</div>
	</section>

	<section class="mt-4">
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">開課班級</h2>
			<span class="badge text-bg-primary" th:text="${#lists.size(activeClasses)}">0</span>
		</div>
		<div class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>班級</th>
					<th>教師</th>
					<th>上課時間</th>
					<th class="text-end">操作</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(activeClasses)}">
					<td colspan="4" class="text-center text-secondary py-4">目前尚無開課班級</td>
				</tr>
				<tr th:each="classRoom : ${activeClasses}">
					<td>
						<a th:href="@{/classes/{slug}(slug=${classRoom.urlSlug})}"
								th:text="${classRoom.displayName}">班級名稱</a>
					</td>
					<td th:text="${classRoom.teacherName ?: '-'}">-</td>
					<td th:text="${classRoom.scheduleText}">-</td>
					<td class="text-end">
						<a class="btn btn-sm btn-outline-primary"
								th:href="@{/classes/{slug}(slug=${classRoom.urlSlug})}">查看</a>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
