<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-4">
	<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
	<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<div class="d-flex justify-content-between align-items-center gap-3 mb-3">
		<div class="page-title-line mb-1">
			<h1 class="h3 mb-0">薪資試算</h1>
			<span th:replace="~{fragments/layout :: help('薪資依教師出勤紀錄中的當月累積工時計算。\n∙ 薪資＝累積工時 × 時薪\n∙ 課間休息與重疊課程不重複計薪\n∙ 一般教師只能查看自己的薪資\n∙ 主任可查看所有教師並設定時薪')}"></span>
		</div>
		<a class="btn btn-outline-secondary" th:href="@{/}">返回首頁</a>
	</div>

	<form class="row g-2 align-items-end mb-4" method="get" th:action="@{/salary}">
		<div class="col-6 col-sm-4 col-md-3 col-lg-2">
			<label for="salaryYear" class="form-label">年份</label>
			<select id="salaryYear" class="form-select" name="year" required>
				<option th:each="year : ${salaryYears}" th:value="${year}"
						th:text="${year + ' 年'}" th:selected="${year == selectedYear}">2026 年</option>
			</select>
		</div>
		<div class="col-6 col-sm-4 col-md-3 col-lg-2">
			<label for="salaryMonthSelect" class="form-label">月份</label>
			<select id="salaryMonthSelect" class="form-select" name="month" required>
				<option th:each="monthNumber : ${#numbers.sequence(1, 12)}"
						th:value="${monthNumber}" th:text="${monthNumber + ' 月'}"
						th:selected="${monthNumber == selectedMonth}">1 月</option>
			</select>
		</div>
		<div class="col-auto">
			<button class="btn btn-outline-primary" type="submit">查詢</button>
		</div>
	</form>

	<section th:if="${!salaryDirectorView}" th:with="summary=${salarySummaries[0]}">
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">我的薪資</h2>
			<span class="text-secondary"
					th:text="${selectedYear + ' 年 ' + selectedMonth + ' 月'}">2026 年 6 月</span>
		</div>
		<div class="row g-3">
			<div class="col-12 col-md-4">
				<div class="border rounded bg-white p-4 h-100">
					<div class="text-secondary mb-2">時薪</div>
					<div class="fs-3 fw-semibold"
							th:text="${'NT$ ' + summary.hourlyRate}">NT$ 0</div>
				</div>
			</div>
			<div class="col-12 col-md-4">
				<div class="border rounded bg-white p-4 h-100">
					<div class="text-secondary mb-2">累計工時</div>
					<div class="fs-3 fw-semibold" th:text="${summary.workHoursText}">0 小時 0 分</div>
				</div>
			</div>
			<div class="col-12 col-md-4">
				<div class="border rounded bg-white p-4 h-100">
					<div class="text-secondary mb-2">累計薪資</div>
					<div class="fs-3 fw-semibold salary-gold"
							th:text="${'NT$ ' + #numbers.formatDecimal(summary.salary, 1, 2)}">NT$ 0.00</div>
				</div>
			</div>
		</div>
		<div class="mt-4">
			<div class="d-flex align-items-center gap-2 mb-2">
				<h3 class="h5 mb-0">我的打卡紀錄</h3>
				<span class="badge text-bg-primary"
						th:text="${#lists.size(summary.attendanceRecords)}">0</span>
			</div>
			<div class="table-responsive bg-white border rounded">
				<table class="table table-hover align-middle mb-0">
					<thead class="table-light">
					<tr>
						<th>日期</th>
						<th>上班</th>
						<th>下班</th>
						<th>對應課程</th>
						<th>課程時間</th>
						<th>計入時數</th>
						<th>備註</th>
					</tr>
					</thead>
					<tbody>
					<tr th:if="${#lists.isEmpty(summary.attendanceRecords)}">
						<td colspan="7" class="text-center text-secondary py-4">本月尚無打卡紀錄</td>
					</tr>
					<tr th:each="attendance : ${summary.attendanceRecords}">
						<td th:text="${#temporals.format(attendance.date, 'yyyy-MM-dd')}">2026-01-01</td>
						<td th:text="${attendance.clockInTime == null ? '-' : #temporals.format(attendance.clockInTime, 'HH:mm')}">-</td>
						<td th:text="${attendance.clockOutTime == null ? '-' : #temporals.format(attendance.clockOutTime, 'HH:mm')}">-</td>
						<td th:text="${attendance.matchedCourseName ?: '-'}">-</td>
						<td th:text="${attendance.matchedCourseTimeText ?: '-'}">-</td>
						<td th:text="${attendance.countedHoursText}">0 小時</td>
						<td th:text="${attendance.manualRemark ?: (attendance.note ?: '-')}">-</td>
					</tr>
					</tbody>
				</table>
			</div>
		</div>
	</section>

	<section th:if="${salaryDirectorView}">
		<div class="d-flex align-items-center gap-2 mb-2">
			<h2 class="h5 mb-0">教師薪資</h2>
			<span class="badge text-bg-primary" th:text="${#lists.size(salarySummaries)}">1</span>
			<span class="text-secondary"
					th:text="${selectedYear + ' 年 ' + selectedMonth + ' 月'}">2026 年 6 月</span>
		</div>
		<div class="table-responsive bg-white border rounded">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>名稱</th>
					<th>累積工時</th>
					<th>時薪</th>
					<th>累積薪資</th>
					<th class="text-end">設定當月時薪</th>
				</tr>
				</thead>
				<tbody>
				<th:block th:each="summary : ${salarySummaries}">
				<tr role="button" data-bs-toggle="collapse"
						th:data-bs-target="${'#salaryAttendance_' + summary.teacher.id}"
						th:aria-controls="${'salaryAttendance_' + summary.teacher.id}"
						aria-expanded="false">
					<td>
						<span class="fw-semibold" th:text="${summary.teacher.displayName}">教師名稱</span>
						<span th:if="${summary.teacher.status.name() == 'LEFT'}"
								class="badge text-bg-danger ms-1">已離職</span>
						<span class="text-secondary small ms-2">展開／收合</span>
					</td>
					<td th:text="${summary.workHoursText}">0 小時 0 分</td>
					<td th:text="${'NT$ ' + summary.hourlyRate}">NT$ 0</td>
					<td class="fw-semibold salary-gold"
							th:text="${'NT$ ' + #numbers.formatDecimal(summary.salary, 1, 2)}">NT$ 0.00</td>
					<td class="text-end">
						<form class="d-inline-flex justify-content-end gap-2"
								th:action="@{/salary/{id}/hourly-rate(id=${summary.teacher.id})}"
								method="post" onclick="event.stopPropagation();">
							<input type="hidden" name="year" th:value="${selectedYear}">
							<input type="hidden" name="month" th:value="${selectedMonth}">
							<input class="form-control form-control-sm" style="width: 130px;" type="number"
									name="hourlyRate" min="0" max="1000000" step="1"
									th:value="${summary.hourlyRate}" required
									th:aria-label="${summary.teacher.displayName + '的當月時薪'}">
							<button class="btn btn-sm btn-outline-primary" type="submit">儲存</button>
						</form>
					</td>
				</tr>
				<tr class="collapse" th:id="${'salaryAttendance_' + summary.teacher.id}">
					<td colspan="5" class="p-0">
						<div class="p-3 bg-body-tertiary">
							<div class="table-responsive border rounded bg-white">
								<table class="table table-sm align-middle mb-0">
									<thead class="table-light">
									<tr>
										<th>日期</th>
										<th>上班</th>
										<th>下班</th>
										<th>對應課程</th>
										<th>課程時間</th>
										<th>計入時數</th>
										<th>備註／人工時數</th>
									</tr>
									</thead>
									<tbody>
									<tr th:if="${#lists.isEmpty(summary.attendanceRecords)}">
										<td colspan="7" class="text-center text-secondary py-3">本月尚無打卡紀錄</td>
									</tr>
									<tr th:each="attendance : ${summary.attendanceRecords}">
										<td th:text="${#temporals.format(attendance.date, 'yyyy-MM-dd')}">2026-01-01</td>
										<td th:text="${attendance.clockInTime == null ? '-' : #temporals.format(attendance.clockInTime, 'HH:mm')}">-</td>
										<td th:text="${attendance.clockOutTime == null ? '-' : #temporals.format(attendance.clockOutTime, 'HH:mm')}">-</td>
										<td th:text="${attendance.matchedCourseName ?: '-'}">-</td>
										<td th:text="${attendance.matchedCourseTimeText ?: '-'}">-</td>
										<td th:text="${attendance.countedHoursText}">0 小時</td>
										<td>
											<div th:unless="${attendance.manualAdjustmentAllowed}"
													th:text="${attendance.note ?: '-'}">-</div>
											<form th:if="${attendance.manualAdjustmentAllowed}"
													class="d-flex flex-nowrap align-items-center gap-2"
													style="min-width: 500px;"
													th:action="@{/salary/attendance/{id}/adjust(id=${attendance.id})}"
													method="post" onclick="event.stopPropagation();">
												<input type="hidden" name="year" th:value="${selectedYear}">
												<input type="hidden" name="month" th:value="${selectedMonth}">
												<div class="d-flex flex-nowrap align-items-center gap-2 flex-grow-1">
													<label class="form-label small mb-0 text-nowrap"
															th:for="${'manualRemark_' + attendance.id}">備註</label>
													<input class="form-control form-control-sm"
															style="min-width: 150px;"
															th:id="${'manualRemark_' + attendance.id}"
															name="manualRemark" maxlength="255"
															th:value="${attendance.manualRemark}"
															placeholder="例如：加課">
												</div>
												<div class="d-flex flex-nowrap align-items-center gap-2 flex-shrink-0">
													<label class="form-label small mb-0 text-nowrap"
															th:for="${'manualHours_' + attendance.id}">增加時數</label>
													<input class="form-control form-control-sm"
															style="width: 110px;"
															th:id="${'manualHours_' + attendance.id}"
															name="manualHours" type="number"
															min="0" max="24" step="0.5"
															th:value="${attendance.manualHoursInputValue}" required>
												</div>
												<button class="btn btn-sm btn-outline-primary"
														type="submit">儲存調整</button>
											</form>
										</td>
									</tr>
									</tbody>
								</table>
							</div>
						</div>
					</td>
				</tr>
				</th:block>
				<tr th:if="${#lists.isEmpty(salarySummaries)}">
					<td colspan="5"
							class="text-center text-secondary py-4">目前沒有教師薪資資料</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
